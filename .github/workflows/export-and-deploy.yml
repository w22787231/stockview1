name: export-and-deploy

# 跑 trend 引擎 → 產生 5 池 JSON → 部署到 Cloudflare Pages。
#
# 觸發方式：
#   1. schedule   — 每日定時自動更新（見下方 cron，UTC 時間）。
#   2. workflow_dispatch — 在 GitHub Actions 頁面手動按「Run workflow」。
#   3. repository_dispatch (event_type: refresh-data)
#                 — 網頁「🔄 更新資料」按鈕透過 GitHub API 觸發。
#
# 需要的 Secrets（repo Settings → Secrets and variables → Actions）：
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token（Pages:Edit 權限）
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare 帳號 ID
# 以及一個 Variable（非 secret）：
#   CF_PAGES_PROJECT       — Cloudflare Pages 專案名稱（例: adr-trend）

on:
  schedule:
    # 台股收盤 13:30 (UTC+8) → 05:30 UTC；美股收盤 16:00 ET。
    # 取兩個時間各跑一次，確保台美都拿到當日收盤。可自行增減。
    - cron: "30 6 * * 1-5"    # 14:30 台北，台股收盤後
    - cron: "30 21 * * 1-5"   # 美東 16:30/17:30(夏令)，美股收盤後
  workflow_dispatch:
    inputs:
      skip_stocks:
        description: "快速部署:跳過 ~1700 檔個股詳情(約省40分),改從線上沿用既有詳情"
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [refresh-data]

permissions:
  contents: read

concurrency:
  group: export-and-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Export all pools to JSON
        env:
          PYTHONUTF8: "1"            # 關鍵：讓引擎以 UTF-8 讀原始碼，中文趨勢字串才正確
          PYTHONIOENCODING: "utf-8"
          NO_COLOR: "1"             # 關閉 ANSI 顏色（JSON 不需要）
        run: |
          cd engine
          python export_json.py all 50

      - name: Export macro market (indices + sector ETFs)
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_macro.py

      - name: Export Taiwan themes (sector/theme baskets)
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_themes.py

      - name: Export Taiwan industry chains (quotes + fund flow)
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_chain.py

      - name: Export active ETF holdings change
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_etf.py || true

      - name: Export sentiment indicators (VIX/VXN/SKEW/HYG/breadth/F&G)
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python -m pip install pypdf -q || true   # FactSet PDF 解析(forward EPS)
          python export_sentiment.py || true

      - name: Export calendar (econ data + earnings, Taipei time)
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}   # FRED 官方 API(雲端不被擋);未設則退回 fredgraph
        run: |
          cd engine
          python export_calendar.py || true

      - name: Export per-stock detail (top names per pool)
        # 全 5 池(不加數字=全池) + 台股主題成分股，約 1700 檔。
        # 減重：關新聞翻譯(17000次翻譯太慢)、K線抽2年(回測仍自抓5年)。
        # continue-on-error + || true：單池失敗不中斷部署。
        # skip_stocks=true(快速部署)時跳過此步,改由下一步從線上沿用既有詳情。
        if: ${{ github.event.inputs.skip_stocks != 'true' }}
        continue-on-error: true
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          STOCK_INFO_RETRIES: "2"
          STOCK_INFO_SLEEP: "0.5"
          STOCK_TRANSLATE: "0"          # 關新聞翻譯(全池量大時翻譯會爆時間)
        run: |
          cd engine
          python export_stock.py --from-watchlist || true
          python export_stock.py --from-themes    || true
          python export_stock.py --from-pool tw150  || true
          python export_stock.py --from-pool ndx100 || true
          python export_stock.py --from-pool sp500  || true
          python export_stock.py --from-pool sp400  || true
          python export_stock.py --from-pool sp600  || true

      - name: Rehydrate per-stock detail from live (fast deploy)
        # skip_stocks=true 時:從線上沿用既有 data/stock/*.json,免重跑 yfinance。
        if: ${{ github.event.inputs.skip_stocks == 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python rehydrate_stock.py || true

      - name: Export industry median PE (for holdings 同業PE)
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_industry_pe.py || true

      - name: Export full TW code→中文名 (上市+上櫃, for holdings 繁中名)
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_tw_names.py || true

      - name: Stage web output
        run: |
          mkdir -p public
          cp -r web/* public/
          mkdir -p public/data
          cp data/*.json public/data/
          # 台股代號→中文名對照（export_tw_names.py 產生全台股 ~2000 檔；抓取失敗時退回 curated）→ 供前端中文名搜尋/持股繁中名
          cp engine/universe/tw_names.json public/data/tw_names.json
          # 個股詳情在 data/stock/ 子目錄，整包複製
          if [ -d data/stock ]; then mkdir -p public/data/stock && cp data/stock/*.json public/data/stock/; fi
          echo "Built files:"
          ls -la public public/data
          ls -la public/data/stock || true

      - name: Ensure Cloudflare Pages project exists
        # 專案不存在才建立；已存在就靜默跳過（不再讓 GitHub 顯示假紅叉）。
        # 用 npx 直接呼叫 wrangler，先列出現有專案，grep 不到才 create。
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: ${{ vars.CF_PAGES_PROJECT }}
        run: |
          if npx --yes wrangler@3 pages project list 2>/dev/null | grep -qw "$PROJECT"; then
            echo "Pages 專案 '$PROJECT' 已存在，跳過建立。"
          else
            echo "Pages 專案 '$PROJECT' 不存在，建立中…"
            npx --yes wrangler@3 pages project create "$PROJECT" --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ vars.CF_PAGES_PROJECT }} --branch=main

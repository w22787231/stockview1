name: export-and-deploy

# 跑 trend 引擎 → 產生 5 池 JSON → 部署到 Cloudflare Pages。
#
# 觸發方式：
#   1. schedule   — 每日定時自動更新（見下方 cron，UTC 時間）。
#   2. workflow_dispatch — 在 GitHub Actions 頁面手動按「Run workflow」。
#   3. repository_dispatch (event_type: refresh-data)
#                 — 網頁「🔄 更新資料」按鈕透過 GitHub API 觸發。
#
# 需要的 Secrets（repo Settings → Secrets and variables → Actions）：
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token（Pages:Edit 權限）
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare 帳號 ID
# 以及一個 Variable（非 secret）：
#   CF_PAGES_PROJECT       — Cloudflare Pages 專案名稱（例: adr-trend）

on:
  schedule:
    # 台股收盤 13:30 (UTC+8) → 05:30 UTC；美股收盤 16:00 ET。
    # 取兩個時間各跑一次，確保台美都拿到當日收盤。可自行增減。
    - cron: "30 6 * * 1-5"    # 14:30 台北，台股收盤後
    - cron: "30 21 * * 1-5"   # 美東 16:30/17:30(夏令)，美股收盤後
  workflow_dispatch:
    inputs:
      skip_stocks:
        description: "快速部署:跳過 ~1700 檔個股詳情(約省40分),改從線上沿用既有詳情"
        required: false
        type: boolean
        default: false
      web_only:
        description: "純前端部署:只改 index.html/_worker.js 時用。跳過所有資料抓取,全部從線上沿用(~2-3分)"
        required: false
        type: boolean
        default: false
      theme_flow_only:
        description: "輕量部署:沿用線上資料,只重算美股細分產業資金流"
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [refresh-data]

permissions:
  contents: read

concurrency:
  group: export-and-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Export all pools to JSON
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"            # 關鍵：讓引擎以 UTF-8 讀原始碼，中文趨勢字串才正確
          PYTHONIOENCODING: "utf-8"
          NO_COLOR: "1"             # 關閉 ANSI 顏色（JSON 不需要）
        run: |
          cd engine
          python export_json.py all 50

      - name: Export macro market (indices + sector ETFs)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_macro.py

      - name: Export liquidity pressure index (PI)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          pip install yfinance pandas numpy -q || true
          cd engine
          python export_pi.py || echo "[pi] 失敗,沿用線上"

      - name: Export financial stress index (OFR FSI)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          pip install yfinance -q || true
          cd engine
          python export_fsi.py || echo "[fsi] 失敗,沿用線上"

      - name: Export Taiwan themes (sector/theme baskets)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_themes.py

      - name: Export Taiwan industry chains (quotes + fund flow)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_chain.py

      - name: Install Playwright Chromium (for 群益 SPA)
        if: ${{ github.event.inputs.web_only != 'true' }}
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Export active ETF holdings change
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_etf.py || true

      - name: Export sentiment indicators (VIX/VXN/SKEW/HYG/breadth/F&G)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python -m pip install pypdf -q || true   # FactSet PDF 解析(forward EPS)
          python export_sentiment.py || true

      - name: Export advance-decline breadth (US 10Y)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_breadth.py || echo "[breadth] 失敗,沿用線上"
          if [ -s ../data/breadth.json ]; then
            python -c "import json; d=json.load(open('../data/breadth.json',encoding='utf-8')); assert isinstance(d,dict) and isinstance(d.get('us'),dict) and len(d['us'].get('dates') or [])>0" || rm -f ../data/breadth.json
          fi
          if [ ! -s ../data/breadth.json ]; then
            python -c "import json,urllib.request; raw=urllib.request.urlopen(urllib.request.Request('https://stockview1.pages.dev/data/breadth.json',headers={'User-Agent':'Mozilla/5.0'}),timeout=30).read().decode('utf-8-sig'); d=json.loads(raw); assert isinstance(d,dict) and isinstance(d.get('us'),dict); open('../data/breadth.json','w',encoding='utf-8').write(json.dumps(d,ensure_ascii=False,separators=(',',':')))" && echo "[breadth] 已沿用線上" || echo "[breadth] 線上沿用也失敗"
          fi

      - name: Export speculation temperature (投機溫度)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          pip install yfinance pandas numpy -q || true
          cd engine
          python export_spec.py || echo "[spec] 失敗,沿用線上"

      - name: Export US theme flow (細分產業資金流)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_us_theme_flow.py || echo "[theme-flow] 失敗,沿用線上"
          if [ -s ../data/us_theme_flow.json ]; then
            python -c "import json; d=json.load(open('../data/us_theme_flow.json',encoding='utf-8')); assert isinstance(d,dict) and isinstance(d.get('groups'),list) and len(d.get('groups') or [])>0" || rm -f ../data/us_theme_flow.json
          fi
          if [ ! -s ../data/us_theme_flow.json ]; then
            python -c "import json,urllib.request; raw=urllib.request.urlopen(urllib.request.Request('https://stockview1.pages.dev/data/us_theme_flow.json',headers={'User-Agent':'Mozilla/5.0'}),timeout=30).read().decode('utf-8-sig'); d=json.loads(raw); assert isinstance(d,dict) and isinstance(d.get('groups'),list); open('../data/us_theme_flow.json','w',encoding='utf-8').write(json.dumps(d,ensure_ascii=False,separators=(',',':')))" && echo "[theme-flow] 已沿用線上" || echo "[theme-flow] 線上沿用也失敗"
          fi

      - name: Export SPX 0DTE share (自算 proxy)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          pip install yfinance -q || true
          cd engine
          python export_0dte.py || echo "[0dte] 失敗,沿用線上"

      - name: Export calendar (econ data + earnings, Taipei time)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}   # FRED 官方 API(雲端不被擋);未設則退回 fredgraph
        run: |
          cd engine
          python export_calendar.py || true

      - name: Export per-stock detail (top names per pool)
        # 全 5 池(不加數字=全池) + 台股主題成分股，約 1700 檔。
        # 減重：關新聞翻譯(17000次翻譯太慢)、K線抽2年(回測仍自抓5年)。
        # continue-on-error + || true：單池失敗不中斷部署。
        # skip_stocks=true(快速部署)時跳過此步,改由下一步從線上沿用既有詳情。
        if: ${{ github.event.inputs.skip_stocks != 'true' && github.event.inputs.web_only != 'true' }}
        continue-on-error: true
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          STOCK_INFO_RETRIES: "2"
          STOCK_INFO_SLEEP: "0.5"
          STOCK_TRANSLATE: "0"          # 關新聞翻譯(全池量大時翻譯會爆時間)
        run: |
          cd engine
          python export_stock.py --from-watchlist || true
          python export_stock.py --from-themes    || true
          python export_stock.py --from-pool tw150  || true
          python export_stock.py --from-pool ndx100 || true
          python export_stock.py --from-pool sp500  || true
          python export_stock.py --from-pool sp400  || true
          python export_stock.py --from-pool sp600  || true

      - name: Rehydrate per-stock detail from live (fast deploy)
        # skip_stocks=true 時:從線上沿用既有 data/stock/*.json,免重跑 yfinance。
        # web_only 走下方 pull_live_data 一次抓回全部,故此步不重複。
        if: ${{ github.event.inputs.skip_stocks == 'true' && github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python rehydrate_stock.py || true

      - name: Pull ALL data from live (web-only deploy)
        # web_only=true:純前端更新。完全不重算,從線上沿用整個 data 樹(頂層+池+中文名+個股)。
        if: ${{ github.event.inputs.web_only == 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python pull_live_data.py || true

      - name: Export US theme flow only (light deploy)
        if: ${{ github.event.inputs.theme_flow_only == 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_us_theme_flow.py

      - name: Export industry median PE (for holdings 同業PE)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_industry_pe.py || true

      - name: Export full TW code→中文名 (上市+上櫃, for holdings 繁中名)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          cd engine
          python export_tw_names.py || true

      - name: Export capital flows (TW 三大法人/融資券 + US Fed流動性/類股輪動)
        if: ${{ github.event.inputs.web_only != 'true' }}
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}   # 美股流動性序列(WALCL/TGA/RRP/HY/MMF)
        run: |
          cd engine
          # 資料源限流時最多跑 6 分鐘就中止(timeout),避免整個部署卡死
          timeout 360 python export_capital.py || echo "[capital] 逾時/失敗,改沿用線上"
          # 若沒產出(被中止)→ 從線上沿用,確保站上資金資料不消失
          if [ ! -s ../data/capital.json ]; then
            python -c "import urllib.request,io; open('../data/capital.json','wb').write(urllib.request.urlopen(urllib.request.Request('https://stockview1.pages.dev/data/capital.json',headers={'User-Agent':'Mozilla/5.0'}),timeout=30).read())" && echo "[capital] 已沿用線上" || echo "[capital] 線上沿用也失敗"
          fi

      - name: Preserve lite pools (us5000/tw_all/strong) from live
        # us5000/tw_all/strong 由各自獨立 workflow 產生;主流程是全站快照,
        # 須從 live 沿用,否則部署會把它們抹掉(分頁 404)。strong=強勢股篩選(us5000 workflow 順便產)。
        if: ${{ github.event.inputs.web_only != 'true' }}
        run: |
          for p in us5000 tw_all strong strong_tw smartmoney; do
            curl -fsS "https://stockview1.pages.dev/data/$p.json" -o "data/$p.json" || echo "[lite] $p 尚無(略過)"
          done
      - name: Preserve lite pools' per-stock detail from live
        # us5000/tw_all 的 Buy 股詳情由各自 workflow 產生;主流程全快照須沿用,否則搜尋/點擊壞。
        if: ${{ github.event.inputs.web_only != 'true' }}
        working-directory: engine
        run: python preserve_lite_stock.py || true
      - name: Stage web output
        run: |
          mkdir -p public
          cp -r web/* public/
          mkdir -p public/data
          cp data/*.json public/data/
          # 台股代號→中文名對照（export_tw_names.py 產生全台股 ~2000 檔；抓取失敗時退回 curated）→ 供前端中文名搜尋/持股繁中名
          cp engine/universe/tw_names.json public/data/tw_names.json
          # 個股詳情在 data/stock/ 子目錄，整包複製
          if [ -d data/stock ]; then mkdir -p public/data/stock && cp data/stock/*.json public/data/stock/; fi
          echo "Built files:"
          ls -la public public/data
          ls -la public/data/stock || true

      - name: Ensure Cloudflare Pages project exists
        # 專案不存在才建立；已存在就靜默跳過（不再讓 GitHub 顯示假紅叉）。
        # 用 npx 直接呼叫 wrangler，先列出現有專案，grep 不到才 create。
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT: ${{ vars.CF_PAGES_PROJECT }}
        run: |
          if npx --yes wrangler@3 pages project list 2>/dev/null | grep -qw "$PROJECT"; then
            echo "Pages 專案 '$PROJECT' 已存在，跳過建立。"
          else
            echo "Pages 專案 '$PROJECT' 不存在，建立中…"
            npx --yes wrangler@3 pages project create "$PROJECT" --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ vars.CF_PAGES_PROJECT }} --branch=main

      - name: Push golden-cross alerts (Web Push, 全市場)
        # 收盤後偵測全市場(各池)當日新金叉 → 發摘要推播給所有訂閱者。
        # 缺 PUSH_KV_ID / VAPID_* secret 時腳本自動 no-op,不影響部署。
        if: ${{ github.event.inputs.web_only != 'true' }}
        continue-on-error: true
        working-directory: engine
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PUSH_KV_ID: ${{ secrets.PUSH_KV_ID }}
          VAPID_PRIVATE_PEM: ${{ secrets.VAPID_PRIVATE_PEM }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          PUSH_SKIP: "us5000,tw_all"   # lite 池由各自 workflow 推 Buy,主流程不重複
        run: |
          pip install pywebpush requests >/dev/null 2>&1 || true
          python push_golden_cross.py || echo "[push] 步驟失敗(略過)"

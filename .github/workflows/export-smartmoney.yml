name: export-smartmoney
# 聰明錢(機構持倉/SEC 13F)每日匯出。美股收盤後一次,解耦部署。
on:
  schedule:
    - cron: "0 22 * * 1-5"    # UTC 22:00 週一到週五(美東收盤後)
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: smartmoney-deploy
  cancel-in-progress: false
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: python -m pip install --upgrade pip
      - name: Pull ALL existing live data (保留全站快照)
        # Cloudflare Pages 部署是「整個目錄快照」,會取代整站。本工作流只產 smartmoney.json,
        # 若不先把線上整個 data 樹(頂層 JSON + 5 池 + 中文名 + ~1700 檔個股詳情,含 smartmoney 基準)
        # 抓回來,部署就會把 tw150/sp500/macro/etf/個股 等其他分頁資料全部抹掉(分頁載入 <!DOCTYPE)。
        # pull_live_data.py 與其他工作流共用的同一保站機制。
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: cd engine && python pull_live_data.py || true
      - name: Preserve lite pools' per-stock detail from live
        # lite 池 Buy 股詳情,沿用線上,避免被快照抹掉。
        working-directory: engine
        run: python preserve_lite_stock.py || true
      - name: Export smartmoney
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          NO_COLOR: "1"
          QUIVER_API_KEY: ${{ secrets.QUIVER_API_KEY }}
          SEC_UA: ${{ secrets.SEC_UA }}
        run: cd engine && python export_smartmoney.py
      - name: Stage web output
        run: |
          mkdir -p public && cp -r web/* public/
          mkdir -p public/data && cp data/*.json public/data/
          cp engine/universe/tw_names.json public/data/tw_names.json || true
          if [ -d data/stock ]; then mkdir -p public/data/stock && cp data/stock/*.json public/data/stock/ || true; fi
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ vars.CF_PAGES_PROJECT }} --branch=main

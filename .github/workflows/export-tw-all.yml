name: export-tw-all
# 台股全上市櫃 ~1800(不過濾)輕量金叉池。台股收盤後一天一次,解耦於 40 分主流程。
on:
  schedule:
    - cron: "30 6 * * 1-5"     # 14:30 台北,台股收盤後
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: lite-pool-deploy
  cancel-in-progress: false
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas
      - name: Pull existing live data
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: cd engine && python pull_live_data.py || true
      - name: Keep sibling lite pool (us5000)
        run: curl -fsS "https://stockview1.pages.dev/data/us5000.json" -o data/us5000.json || echo "us5000 尚無(首次)"
      - name: Export tw_all lite pool
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          NO_COLOR: "1"
        run: cd engine && python export_lite_pool.py tw_all
      - name: Per-stock detail for this pool's Buy stocks
        # 對本池 Buy 股(~60-90)產生個股詳情(K線/財報/回測),併入 _index → 可搜尋/點進詳情。
        continue-on-error: true
        working-directory: engine
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          STOCK_TRANSLATE: "0"
          STOCK_INFO_RETRIES: "3"
          STOCK_INFO_SLEEP: "0.6"
          NO_COLOR: "1"
        run: |
          syms=$(python -c "import json,io; d=json.load(io.open('../data/tw_all.json',encoding='utf-8')); cs=d['cross_signals']; print(' '.join(r['sym'] for r in cs['golden']+cs['death']))")
          if [ -n "$syms" ]; then python export_stock.py $syms || true; else echo "本池無 Buy 股"; fi
      - name: Tag business sector (中文) into cross_signals
        # 讀本池 Buy 股已產生的個股詳情 metrics.sector → 中文,寫進 cross_signals 列(代號旁顯示業務類別)。
        continue-on-error: true
        working-directory: engine
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: python patch_lite_sector.py tw_all || true
      - name: Stage web output
        run: |
          mkdir -p public && cp -r web/* public/
          mkdir -p public/data && cp data/*.json public/data/
          cp engine/universe/tw_names.json public/data/tw_names.json || true
          if [ -d data/stock ]; then mkdir -p public/data/stock && cp data/stock/*.json public/data/stock/ || true; fi
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ vars.CF_PAGES_PROJECT }} --branch=main
      - name: Push Buy alerts (this lite pool)
        # 本 lite 池今日新 Buy(buy_days==0)推播給訂閱者;缺 secret 自動 no-op。
        continue-on-error: true
        working-directory: engine
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PUSH_KV_ID: ${{ secrets.PUSH_KV_ID }}
          VAPID_PRIVATE_PEM: ${{ secrets.VAPID_PRIVATE_PEM }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
          PUSH_ONLY: "tw_all"
          PUSH_SIGNAL: "buy"
          PUSH_LABEL: "台股全市場"
        run: |
          pip install pywebpush requests >/dev/null 2>&1 || true
          python push_golden_cross.py || echo "[push] 失敗(略過)"

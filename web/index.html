// 今日盤中分時迷你圖:綠/紅依「最後價 vs 昨收」,虛線=昨收基準。
function _miniSpark(pts, prev){
  if(!pts || pts.length<2) return '<span class="dim" style="font-size:10px">–</span>';
  const w=66,h=22,pad=2,n=pts.length, base=(prev!=null)?prev:pts[0], last=pts[n-1];
  const col=last>=base?"#16a34a":"#e11d48";
  let min=Math.min.apply(null,pts), max=Math.max.apply(null,pts);
  if(prev!=null){ min=Math.min(min,prev); max=Math.max(max,prev); }
  const rng=(max-min)||1, X=i=>pad+i/(n-1)*(w-2*pad), Y=v=>pad+(1-(v-min)/rng)*(h-2*pad);
  let dline=""; for(let i=0;i<n;i++) dline+=(i?"L":"M")+X(i).toFixed(1)+" "+Y(pts[i]).toFixed(1)+" ";
  const baseLine=(prev!=null)?'<line x1="'+pad+'" y1="'+Y(prev).toFixed(1)+'" x2="'+(w-pad)+'" y2="'+Y(prev).toFixed(1)+'" stroke="#9aa6b6" stroke-width="0.6" stroke-dasharray="2 2"/>':"";
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="vertical-align:middle" title="今日盤中分時(虛線=昨收)">'+
    baseLine+'<path d="'+dline+'" fill="none" stroke="'+col+'" stroke-width="1.3"/></svg>';
}
// EMA20/60 交叉狀態:golden(金叉)/death(死叉)+ 距今幾日(與技術線圖同口徑)。
function _holdCross(cl){
  if(!cl || cl.length < 62) return {state:null, days:null};
  const s=_maCalc(cl,20,"ema"), l=_maCalc(cl,60,"ema"), n=cl.length;
  if(s[n-1]==null || l[n-1]==null) return {state:null, days:null};
  const state=s[n-1]>=l[n-1] ? "golden" : "death";
  let days=null;
  for(let i=n-1;i>0;i--){ const ps=s[i-1],pl=l[i-1],cs=s[i],ll=l[i];
    if(ps==null||pl==null||cs==null||ll==null) break;
    if(((ps-pl)<=0&&(cs-ll)>0)||((ps-pl)>=0&&(cs-ll)<0)){ days=(n-1)-i; break; } }
  return {state, days};
}
// 近 n 日量價加權平均價(VWAP)=籌碼平均成本估算(以收盤×量)。
function _vwap(cl, vl, n){
  if(!cl || !vl || !cl.length) return null;
  const m=Math.min(n, cl.length, vl.length);
  let pv=0, v=0;
  for(let i=cl.length-m; i<cl.length; i++){ if(cl[i]!=null && vl[i]!=null){ pv+=cl[i]*vl[i]; v+=vl[i]; } }
  return v>0 ? pv/v : null;
}

    if(!col.sort) return '<th'+al+'>'+col.lab+'</th>';
    const ar=st.k===col.k?(st.dir===1?'▲':'▼'):'⇅';
    return '<th class="sortable" data-k="'+col.k+'"'+al+'>'+col.lab+'<span class="sar">'+ar+'</span></th>';
  }).join("")+'<th></th></tr>';
  box.innerHTML='<div class="tbl-wrap"><table><thead>'+head+'</thead><tbody>'+trs+'</tbody></table></div>'+
    '<div class="legend">點<b>欄位標題</b>排序、點<b>代號</b>看個股分析、在<b>購買價</b>填成本價(支援算式如 50*2):現價跌破成本價會亮<span class="blink-dot" style="position:relative;top:1px"></span>紅色閃爍燈(點<b>🔴</b>欄標題可把跌破列排到最上)。<b>均線交叉</b>=EMA20/60 ▲金叉(多)/▼死叉(空)+ 距今幾日,與技術線圖 Buy/Sell 同口徑。fwd EPS/PE=分析師預估;同業PE=同產業中位數;PEG(<span class="pos">&lt;1 偏低估</span>、<span class="neg">&gt;2 偏高估</span>);目標價括號=較現價空間。<b>20日均成本</b>=近20日量價加權均價(估算近期籌碼成本),括號=現價較均成本的帳面損益%(<span class="pos">綠=均成本下、賺</span>)。基本面來源 Yahoo,即時報價可能延遲約15分。</div>';
  // 事件:刪除、表頭排序、購買價輸入、點代號進個股(皆限本池 box 內)。
  box.querySelectorAll(".hold-del").forEach(b=>b.onclick=()=>removeHoldCode(b.dataset.code, pid));
  box.querySelectorAll("th.sortable").forEach(th=>th.onclick=()=>{
    const k=th.dataset.k;
    if(st.k===k) st.dir=-st.dir; else { st.k=k; st.dir=(k==="code"||k==="name")?1:-1; }
    drawHoldTable(pid);
  });
  box.querySelectorAll(".sym.clk").forEach(td=>td.onclick=()=>openHoldStock(td.dataset.code, td.dataset.used));
  box.querySelectorAll(".buy-in").forEach(inp=>{
    const slot=inp.dataset.slot==="2"?2:1;
    const commit=()=>{ const v=evalNum(inp.value);      // 支援算式,如 50*2 → 100
      saveBuyPrice(inp.dataset.code, v==null?"":v, slot, pid);
      const row=((window._HOLD[pid]||{}).data||[]).find(x=>x.code===inp.dataset.code);
      if(row){ if(slot===2) row.buy2=v; else row.buy=v; }
      drawHoldTable(pid); };
    inp.addEventListener("change",commit);
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.isComposing){ e.preventDefault(); inp.blur(); } });
    inp.addEventListener("click",e=>e.stopPropagation());
  });
}

      '<b>預期(consensus)無免費資料源</b>。來源 FRED。</div>'
    : "";
  const _emptyTxt={usdata:"美股重要數據",usearn:"美股大型股財報(財報季約季中起,屆時自動帶出)",tw:(CAL_TW_ALL?"台股法說/受邀論壇":"台股正式法說會")}[CAL_REGION];
  const _bindTw=()=>{ box.querySelectorAll(".tw-tg").forEach(b=>b.onclick=()=>{ CAL_TW_ALL=(b.dataset.m==="all"); renderCalList(d); }); };

  let html="";

    html+='<div class="cal-day"><div class="cal-date">'+ds.slice(5).replace("-","/")+

           :'<span class="cal-badge earn">📈 財報</span>'+sessBadge);
      const valPart=e.subHtml?'<span class="cal-val">'+e.subHtml+'</span>':'<span class="cal-sub">'+esc(e.sub||"")+'</span>';

// 依市場決定查詢候選:台股(數字)試 .TW/.TWO;美股/其他股用完整代號(如 NVDA、4062.T)。
function _supplyCands(s){ const code=(s.code||"").toUpperCase(); return (s.market==="tw"||(/^\d/.test(code)&&!code.includes(".")))?_holdCand(code):[code]; }
function _supplyMkt(s){ return s.market || ((/^\d/.test((s.code||""))&&!String(s.code).includes("."))?"tw":"us"); }
async function fetchSupplyQuotes(theme){
  const box=$("#supplyResult"); if(!box) return;
  const stocks=theme.stocks||[];
  const cands=[...new Set(stocks.flatMap(_supplyCands))];
  const batches=[]; for(let i=0;i<cands.length;i+=5) batches.push(cands.slice(i,i+5));
  const Q={};
  const fb=async b=>{ for(let i=0;i<3;i++){ try{ const d=await (await fetch("/api/quotes?kline=1&syms="+encodeURIComponent(b.join(","))+"&t="+Date.now()+"_"+i,{cache:"no-store"})).json(); if(d&&d.quotes&&Object.keys(d.quotes).length) return d.quotes; }catch(e){} } return {}; };
  try{ (await Promise.all(batches.map(fb))).forEach(q=>Object.assign(Q,q||{})); }catch(e){}
  const sg=v=>v==null?"":(v>=0?"+":""), c=v=>v==null?"dim":(v>=0?"pos":"neg");
  const pctTd=v=>'<td class="'+c(v)+'">'+(v!=null?sg(v)+v.toFixed(1)+"%":"–")+'</td>';
  const fmt=v=>v==null?"–":Number(v).toLocaleString(undefined,{maximumFractionDigits:2});
  const rowHtml=s=>{
    const code=(s.code||"").toUpperCase(); let qt=null,used=null;
    for(const cd of _supplyCands(s)){ if(Q[cd]){qt=Q[cd];used=cd;break;} }
    const cl=(qt&&qt.closes)||[], vl=(qt&&qt.volumes)||[];
    const r1=qt?_retN(cl,1):null, r5=qt?_retN(cl,5):null, r20=qt?_retN(cl,20):null, volr=qt?_volr(cl,vl):null;
    return '<tr>'+
      '<td class="sym clk" data-code="'+esc(code)+'" data-used="'+esc(used||"")+'" title="點擊看個股">'+esc(used||code)+'</td>'+
      '<td style="text-align:left">'+esc(s.name||"")+'</td>'+
      '<td style="text-align:left;font-size:12px;color:var(--ink2)">'+esc(s.role||"")+'</td>'+
      '<td><span class="hl-tag mid">'+esc(s.tag||"")+'</span></td>'+
      '<td>'+(qt?fmt(qt.price):'<span class="dim">查無</span>')+'</td>'+
      pctTd(r1)+pctTd(r5)+pctTd(r20)+
      '<td>'+(volr!=null?volr.toFixed(2)+"×":"–")+'</td></tr>';
  };
  const head='<tr><th style="text-align:left">代號</th><th style="text-align:left">名稱</th><th style="text-align:left">供應鏈角色</th><th>定位</th><th>現價</th><th>1日</th><th>5日</th><th>20日</th><th>量比</th></tr>';
  let html="";
  [["tw","🇹🇼 台股"],["us","🇺🇸 美股"],["other","🌐 其他股"]].forEach(([k,lab])=>{
    const list=stocks.filter(s=>_supplyMkt(s)===k);
    if(!list.length) return;
    html+='<div class="tg-gname" style="margin:14px 0 4px;font-size:14px">'+lab+' <span class="dim" style="font-weight:400">'+list.length+' 檔</span></div>'+
      '<div class="tbl-wrap"><table><thead>'+head+'</thead><tbody>'+list.map(rowHtml).join("")+'</tbody></table></div>';
  });
  box.innerHTML=html||'<div class="legend">此主題暫無個股。</div>';
  box.querySelectorAll(".sym.clk").forEach(td=>td.onclick=()=>openHoldStock(td.dataset.code, td.dataset.used));
}

function strongApply(all,f){

    ((r.dv30||0)>=f.dv30*u) &&
    ((r.dv1||0)>=f.dv1*u) &&

  );

    '<div id="capRetailChart" class="cap-chart"></div>';
  const series=[["外資",f,"#1f6feb"],["投信",t.trust||[],"#16a34a"],["自營",t.dealer||[],"#f59e0b"]].filter(s=>s[1].length);
  if(f.length>=2) drawCapLines("capTxChart",f.map(x=>x.date),series.map(s=>[s[0],s[1].map(x=>x.oi),s[2],"oi"]),"口");
  else $("#capTxChart").innerHTML='<div class="legend">暫無期貨資料。</div>';
  const rmap={},smap={}; rt.forEach(x=>rmap[x.date]=x.ratio); rs.forEach(x=>smap[x.date]=x.ratio);
  const rdates=[...new Set([...rt.map(x=>x.date),...rs.map(x=>x.date)])].sort();

  if(rt.length) rseries.push(["微台散戶",rdates.map(d=>rmap[d]!=null?rmap[d]:null),"#7c4dff"]);
  if(rs.length) rseries.push(["小台散戶",rdates.map(d=>smap[d]!=null?smap[d]:null),"#0891b2"]);
  if(rseries.length) drawCapLines("capRetailChart",rdates,rseries.map(s=>[s[0],s[1],s[2],"val"]),"%");
  else $("#capRetailChart").innerHTML='<div class="legend">暫無散戶多空比資料。</div>';
}

    yAxis:{type:"value",name:unit,nameTextStyle:{fontSize:10},axisLabel:{fontSize:10},splitLine:{lineStyle:{opacity:.3}}},
    series:series.map(s=>({name:s[0],type:"bar",data:s[1],itemStyle:{color:s[2]}}))},true);

function drawCapLines(id,dates,series,unit){
  const el=$("#"+id); if(!el||!window.echarts) return;
  const ch=echarts.getInstanceByDom(el)||echarts.init(el,null,{renderer:"canvas"});

  const single=series.length===1;
  ch.setOption({grid:{left:56,right:14,top:24,bottom:30},
    legend:{top:0,textStyle:{fontSize:11},show:!single},tooltip:{trigger:"axis"},
    xAxis:{type:"time",axisLabel:{fontSize:9,hideOverlap:true,
      formatter:(val)=>{const dt=new Date(val);const m=dt.getMonth();return m===0?dt.getFullYear()+"年":(m+1)+"月";}}},
    yAxis:{type:"value",name:unit,nameTextStyle:{fontSize:10},scale:true,axisLabel:{fontSize:10},splitLine:{lineStyle:{opacity:.3}}},
    series:series.map(s=>({name:s[0],type:"line",smooth:true,showSymbol:false,
      data:dates.map((d,i)=>[toMs(d),s[1][i]]),lineStyle:{color:s[2],width:2},itemStyle:{color:s[2]},
      areaStyle:single?{color:s[2],opacity:.08}:undefined}))},true);
  if(!el._ro){ el._ro=()=>ch.resize(); window.addEventListener("resize",el._ro); }
}
// ── 流動性壓力指數(PI) ── 雙軸折線圖 + 窗切換 + 六因子橫條 ──
// ── 金融壓力指數(OFR FSI):FSI + 20MA + 50MA + S&P500 四線疊圖 + 窗 + 5類/3地區拆解 ──
let FSI_DATA = null;
let FSI_WIN  = "5y";
let FSI_INV  = false;   // 反轉視角:顯示 −FSI(與股市同向)
const FSI_WIN_LABEL = {"1m":"1月","3m":"3月","6m":"6月","1y":"1年","3y":"3年","5y":"5年","10y":"10年","max":"全部"};

function drawFsiChart(id, dates, fsi, ma20, ma50, ma60, sp500, inv){
  const el = $("#"+id);
  if(!el || !window.echarts) return;
  const _old = echarts.getInstanceByDom(el); if(_old) _old.dispose();
  const ch = echarts.init(el, null, {renderer:"canvas"});
  const sgn = inv ? -1 : 1;
  const toMs = s => new Date(s.length<=10 ? s+"T00:00:00" : s).getTime();
  const L  = arr=>dates.map((d,i)=>[toMs(d), (arr&&arr[i]!=null)? sgn*arr[i] : null]);   // FSI 族:反轉時取負
  const Lsp= arr=>dates.map((d,i)=>[toMs(d), (arr&&arr[i]!=null)? arr[i] : null]);        // S&P500 不變
  const fsiName = inv ? "風險偏好 −FSI" : "金融壓力 FSI";
  ch.setOption({
    grid:{left:56, right:56, top:30, bottom:30},
    legend:{top:0, textStyle:{fontSize:10}, itemWidth:16, itemHeight:8,
      data:[fsiName,"FSI 20MA","FSI 50MA","FSI 60MA","S&P 500"]},
    tooltip:{trigger:"axis"},
    xAxis:{type:"time", axisLabel:{fontSize:9, hideOverlap:true,
      formatter:(val)=>{const dt=new Date(val);const m=dt.getMonth();return m===0?dt.getFullYear()+"年":(m+1)+"月";}}},
    yAxis:[
      {type:"value", name:(inv?"−FSI":"FSI"), nameTextStyle:{fontSize:10}, scale:true,
       axisLabel:{fontSize:10}, splitLine:{lineStyle:{opacity:.3}}},
      {type:"value", name:"S&P500", nameTextStyle:{fontSize:10}, scale:true,
       axisLabel:{fontSize:10}, splitLine:{show:false}, position:"right"}
    ],
    series:[
      {name:fsiName, type:"line", smooth:true, showSymbol:false, yAxisIndex:0, data:L(fsi),
       lineStyle:{color:"#e11d48", width:2.4}, itemStyle:{color:"#e11d48"},
       areaStyle:{color:"#e11d48", opacity:.06},
       markLine:{symbol:"none",silent:true,lineStyle:{color:"#8b949e",type:"dashed",opacity:.6},data:[
         {yAxis:0},
         {yAxis:sgn*-1, lineStyle:{color:"#e11d48",type:[8,6],width:1.4,opacity:.85},
          label:{formatter:(inv?"+1":"−1"),position:"insideEndTop",color:"#e11d48",fontSize:10}}
       ]}},
      {name:"FSI 20MA", type:"line", smooth:true, showSymbol:false, yAxisIndex:0, data:L(ma20),
       lineStyle:{color:"#f59e0b", width:1.4}, itemStyle:{color:"#f59e0b"}},
      {name:"FSI 50MA", type:"line", smooth:true, showSymbol:false, yAxisIndex:0, data:L(ma50),
       lineStyle:{color:"#9333ea", width:1.4}, itemStyle:{color:"#9333ea"}},
      {name:"FSI 60MA", type:"line", smooth:true, showSymbol:false, yAxisIndex:0, data:L(ma60),
       lineStyle:{color:"#0d9488", width:1.6}, itemStyle:{color:"#0d9488"}},
      {name:"S&P 500", type:"line", smooth:true, showSymbol:false, yAxisIndex:1, data:Lsp(sp500),
       lineStyle:{color:"#2563eb", width:1.4, type:"dashed"}, itemStyle:{color:"#2563eb"}}
    ]
  }, true);
  if(el._ro) window.removeEventListener("resize", el._ro);
  el._ro = ()=>ch.resize();
  window.addEventListener("resize", el._ro);
}

// 拆解橫條(中心 0,正=壓力紅、負=低於常態綠);items=[{key,val}],ref=共用刻度
function fsiBreakdownBars(items, ref){
  return items.map(it=>{
    const v = it.val;
    if(v == null) return "";
    const pct_bar = Math.min(Math.abs(v)/ref*100, 100);
    const isNeg = v < 0;
    const stressed = v >= 0;
    return '<div style="display:flex;align-items:center;gap:8px;margin:4px 0">'+
      '<div style="width:88px;font-size:12px;color:var(--ink2);text-align:right;flex-shrink:0">'+esc(it.key)+'</div>'+
      '<div style="flex:1;background:var(--line);border-radius:4px;height:10px;position:relative;min-width:80px">'+
        '<div style="position:absolute;'+(isNeg?"right:50%":"left:50%")+';width:'+pct_bar/2+'%;height:100%;background:'+(stressed?"#e11d48":"#16a34a")+';border-radius:4px"></div>'+
        '<div style="position:absolute;left:50%;top:0;width:1px;height:100%;background:var(--ink3)"></div>'+
      '</div>'+
      '<div style="width:48px;font-size:12px;text-align:right;flex-shrink:0" class="'+(stressed?"neg":"pos")+'">'+(v>0?"+":"")+v.toFixed(3)+'</div>'+
    '</div>';
  }).join("");
}

function renderFsi(d){
  const box = $("#fsiBlock");
  if(!box) return;
  const win = FSI_WIN, inv = FSI_INV, sgn = inv ? -1 : 1;
  const cur = d.current;
  const ma20 = d.ma20_last, ma50 = d.ma50_last, ma60 = d.ma60_last;
  // 顯示值:反轉時取負(數值卡與線一致);顏色仍依原始壓力(紅=壓力、綠=平靜)
  const dv = x => x==null ? "—" : ((sgn*x)>0?"+":"")+(sgn*x).toFixed(3);
  const fsiColor = (cur!=null && cur>0) ? "#e11d48" : "#16a34a";
  // 趨勢註解(依原始 FSI vs 20/50MA,反轉與否都是談壓力)
  let trend = "";
  if(cur!=null && ma20!=null && ma50!=null){
    if(cur>ma20 && ma20>ma50) trend = '<b class="neg">壓力升溫</b>(FSI 上穿均線)';
    else if(cur<ma20 && ma20<ma50) trend = '<b class="pos">壓力降溫</b>(FSI 跌破均線)';
    else trend = "盤整";
  }

  const wins = d.windows || ["1m","3m","6m","1y","3y","5y"];
  const btns = wins.map(w=>
    '<button class="btn'+(w===win?" active":"")+'" data-fsiw="'+w+'">'+(FSI_WIN_LABEL[w]||w)+'</button>'
  ).join("");
  const invBtn = '<button class="btn'+(inv?" active":"")+'" id="fsiInvBtn" title="反轉視角:顯示 −FSI,讓壓力線與 S&amp;P500 同向(正相關),較直觀">🔄 反轉視角'+(inv?"(−FSI)":"")+'</button>';

  const bd = d.breakdown || {};
  const cats = bd.categories || [], regs = bd.regions || [];
  // 共用刻度 = 所有分量絕對值最大(至少 0.5,避免小值爆滿)
  let ref = 0.5;
  cats.concat(regs).forEach(x=>{ if(x.val!=null) ref = Math.max(ref, Math.abs(x.val)); });
  const card = 'border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:var(--panel);display:inline-block;min-width:120px;margin-right:12px';
  const curLab = inv ? "−FSI 現值" : "FSI 現值";

  box.innerHTML =
    '<section>'+
      '<div class="sec-head"><h2>金融壓力指數(OFR FSI)</h2>'+
        '<span class="tag">美財政部 OFR · 每日 · 2000~</span>'+
        '<span class="hint">'+(inv
          ? '反轉視角:顯示 <b>−FSI</b>(↑＝風險偏好升、與股市<b class="pos">同向</b>);數值已取負'
          : 'FSI&gt;0 壓力高於常態(紅)、FSI&lt;0 低於常態(綠);上穿 20/50MA＝壓力升溫')+'</span></div>'+
      updStamp(d.as_of)+
      '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:8px">'+
        '<div style="'+card+'"><div class="cap-lab">'+curLab+'</div>'+
          '<div class="cap-big" style="color:'+fsiColor+'">'+esc(dv(cur))+'</div></div>'+
        '<div style="'+card+'"><div class="cap-lab">20 日均線</div>'+
          '<div class="cap-big">'+dv(ma20)+'</div></div>'+
        '<div style="'+card+'"><div class="cap-lab">50 日均線</div>'+
          '<div class="cap-big">'+dv(ma50)+'</div></div>'+
        '<div style="'+card+'"><div class="cap-lab">60 日均線</div>'+
          '<div class="cap-big" style="color:#0d9488">'+dv(ma60)+'</div></div>'+
        (trend?'<div class="dim" style="font-size:12px;align-self:center">趨勢:'+trend+'</div>':'')+
      '</div>'+
      '<div style="margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">'+btns+
        '<span style="width:1px;height:18px;background:var(--line);margin:0 4px"></span>'+invBtn+'</div>'+
      '<div id="fsiChart" class="cap-chart" style="height:270px"></div>'+
      '<div style="display:flex;gap:24px;flex-wrap:wrap;margin-top:14px">'+
        '<div style="flex:1;min-width:240px">'+
          '<div class="cap-sub2">壓力來源 · 5 大類(最新,紅=加壓)</div>'+
          '<div style="margin-top:6px">'+fsiBreakdownBars(cats, ref)+'</div></div>'+
        '<div style="flex:1;min-width:240px">'+
          '<div class="cap-sub2">壓力來源 · 3 地區(最新)</div>'+
          '<div style="margin-top:6px">'+fsiBreakdownBars(regs, ref)+'</div></div>'+
      '</div>'+
      '<div class="legend" style="margin-top:10px">資料來源:OFR Financial Stress Index(美國財政部金融研究辦公室)+ Yahoo Finance。OFR FSI 由 33 個市場變數標準化合成,0=正常;5 類/3 地區為加法拆解(加總≈總指數)。視窗 '+esc(FSI_WIN_LABEL[win]||win)+',資料日 '+esc(d.as_of||"")+'。'+(inv?'<b>(反轉視角:線與卡為 −FSI;下方「壓力來源」仍為原始壓力口徑)</b>':'')+'</div>'+
    '</section>';

  // 依窗截取最近 N 筆('max' 不在 WIN_N → 退回全長)
  const ser = d.series || {};
  const allDates = ser.dates || [];
  const WIN_N = {"1m":21,"3m":63,"6m":126,"1y":252,"3y":756,"5y":1260,"10y":2520};
  const n = Math.min(WIN_N[win] || allDates.length, allDates.length);
  const sl = a => (a||[]).slice(-n);
  const dates = sl(allDates);
  if(dates.length>=2){
    drawFsiChart("fsiChart", dates, sl(ser.fsi), sl(ser.ma20), sl(ser.ma50), sl(ser.ma60), sl(ser.sp500), inv);
  } else {
    const c=$("#fsiChart"); if(c) c.innerHTML='<div class="legend">資料點不足,無法繪圖。</div>';
  }

  box.querySelectorAll("[data-fsiw]").forEach(b=>b.onclick=()=>{
    FSI_WIN = b.dataset.fsiw;
    renderFsi(FSI_DATA);
  });
  const ib = box.querySelector("#fsiInvBtn");
  if(ib) ib.onclick=()=>{ FSI_INV = !FSI_INV; renderFsi(FSI_DATA); };
}

async function loadFsi(){
  const box = $("#fsiBlock");
  if(!box) return;
  if(FSI_DATA){ renderFsi(FSI_DATA); return; }
  box.innerHTML='<div class="dim" style="padding:8px">載入金融壓力指數 …</div>';

let PI_DATA = null;
let PI_WIN  = "5y";
let PI_INV  = false;   // 反轉視角:顯示 −PI(與股市同向)
const PI_WIN_LABEL = {"1m":"1月","3m":"3月","6m":"6月","1y":"1年","3y":"3年","5y":"5年"};

function drawPiChart(id, dates, piArr, sp500Arr, inv){
  const el = $("#"+id);
  if(!el || !window.echarts) return;
  // dispose 舊實例後重建，避免 innerHTML 重建後 stale 重用
  const _old = echarts.getInstanceByDom(el); if(_old) _old.dispose();
  const ch = echarts.init(el, null, {renderer:"canvas"});
  const sgn = inv ? -1 : 1;
  const piName = inv ? "流動性寬鬆 −PI" : "流動性壓力 PI";
  const toMs = s => new Date(s.length<=10 ? s+"T00:00:00" : s).getTime();
  ch.setOption({
    grid:{left:56, right:56, top:32, bottom:30},
    legend:{top:0, textStyle:{fontSize:11}},
    tooltip:{trigger:"axis"},
    xAxis:{type:"time", axisLabel:{fontSize:9, hideOverlap:true,
      formatter:(val)=>{const dt=new Date(val);const m=dt.getMonth();return m===0?dt.getFullYear()+"年":(m+1)+"月";}}},
    yAxis:[
      {type:"value", name:(inv?"−PI":"PI"), nameTextStyle:{fontSize:10}, scale:true,
       axisLabel:{fontSize:10}, splitLine:{lineStyle:{opacity:.3}}},
      {type:"value", name:"S&P500", nameTextStyle:{fontSize:10}, scale:true,
       axisLabel:{fontSize:10}, splitLine:{show:false}, position:"right"}
    ],
    series:[
      {name:piName, type:"line", smooth:true, showSymbol:false, yAxisIndex:0,
       data:dates.map((d,i)=>[toMs(d), piArr[i]==null?null:sgn*piArr[i]]),
       lineStyle:{color:"#e8923a", width:2}, itemStyle:{color:"#e8923a"},
       areaStyle:{color:"#e8923a", opacity:.07},
       markLine:{symbol:"none",silent:true,lineStyle:{color:"#8b949e",type:"dashed",opacity:.6},data:[{yAxis:0}]}},
      {name:"S&P 500", type:"line", smooth:true, showSymbol:false, yAxisIndex:1,
       data:dates.map((d,i)=>[toMs(d), sp500Arr[i]]),
       lineStyle:{color:"#2563eb", width:1.5, type:"dashed"}, itemStyle:{color:"#2563eb"}}
    ]
  }, true);
  if(el._ro) window.removeEventListener("resize", el._ro);
  el._ro = ()=>ch.resize();
  window.addEventListener("resize", el._ro);
}

function renderPI(d){
  const box = $("#piBlock");
  if(!box) return;
  const win = PI_WIN, inv = PI_INV, sgn = inv ? -1 : 1;
  const cur = (d.current_by_window||{})[win] || {};
  const piRaw = cur.pi;
  const pi  = piRaw != null ? (sgn*piRaw).toFixed(2) : "—";
  const pct = cur.pctile != null ? cur.pctile.toFixed(1) : "—";
  const comps = cur.components || {};
  const meta  = d.factors_meta || [];

  // 窗切換按鈕
  const wins = d.windows || ["1m","3m","6m","1y","3y","5y"];
  const btns = wins.map(w=>
    '<button class="btn'+(w===win?" active":"")+'" data-piw="'+w+'">'+
      (PI_WIN_LABEL[w]||w)+'</button>'
  ).join("");
  const invBtn = '<button class="btn'+(inv?" active":"")+'" id="piInvBtn" title="反轉視角:顯示 −PI,讓壓力線與 S&amp;P500 同向(正相關),較直覺">🔄 反轉視角'+(inv?"(−PI)":"")+'</button>';

  // 六因子橫條
  const barWidth = 200; // px base for 100% z=3
  const factorBars = meta.map(f=>{
    const z = comps[f.key];
    if(z == null) return "";
    const pct_bar = Math.min(Math.abs(z)/3*100, 100).toFixed(1);
    const isNeg = z < 0;
    // dir:"hi"=高z偏壓力(紅), dir:"lo"=低z偏壓力(紅)
    const stressed = z >= 0;   // z≥0=壓力(紅/.neg), z<0=寬鬆(綠/.pos); z已統一定向不再看dir
    const cls = stressed ? "neg" : "pos";
    return '<div style="display:flex;align-items:center;gap:8px;margin:4px 0">'+
      '<div style="width:120px;font-size:12px;color:var(--ink2);text-align:right;flex-shrink:0">'+esc(f.key)+'</div>'+
      '<div style="flex:1;background:var(--line);border-radius:4px;height:10px;position:relative;min-width:80px">'+
        '<div style="position:absolute;'+(isNeg?"right:50%":"left:50%")+';width:'+pct_bar/2+'%;height:100%;background:'+(stressed?"#e11d48":"#16a34a")+';border-radius:4px"></div>'+
        '<div style="position:absolute;left:50%;top:0;width:1px;height:100%;background:var(--ink3)"></div>'+
      '</div>'+
      '<div style="width:44px;font-size:12px;text-align:right;flex-shrink:0" class="'+cls+'">'+(z>0?"+":"")+z.toFixed(2)+'z</div>'+
    '</div>';
  }).join("");

  // PI 當前讀數卡(顏色依原始壓力:>0 紅;反轉時顯示 −PI)
  const piColor = (piRaw!=null && piRaw>0) ? "#e11d48" : "#16a34a";
  const piCardStyle = 'border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:var(--panel);display:inline-block;min-width:130px;margin-right:12px';

  box.innerHTML =
    '<section>'+
      '<div class="sec-head"><h2>流動性壓力指數(PI)</h2>'+
        '<span class="tag">六因子 z 加權合成</span>'+
        '<span class="hint">'+(inv
          ? '反轉視角:顯示 <b>−PI</b>(↑=流動性寬鬆、與股市<b class="pos">同向</b>);數值已取負'
          : 'PI>0 流動性偏緊、PI<0 流動性寬鬆；歷史分位愈高風險愈大')+'</span></div>'+
      updStamp((d.series&&d.series.dates||[]).slice(-1)[0])+
      '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:10px">'+
        '<div style="'+piCardStyle+'">'+
          '<div class="cap-lab">'+(inv?"−PI 當前值":"PI 當前值")+'</div>'+
          '<div class="cap-big" style="color:'+piColor+'">'+esc(pi)+'</div>'+
        '</div>'+
        '<div style="'+piCardStyle+'">'+
          '<div class="cap-lab">歷史分位('+esc(PI_WIN_LABEL[win]||win)+')</div>'+
          '<div class="cap-big">'+esc(pct)+'%</div>'+
        '</div>'+
      '</div>'+
      '<div style="margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">'+btns+
        '<span style="width:1px;height:18px;background:var(--line);margin:0 4px"></span>'+invBtn+'</div>'+
      '<div id="piChart" class="cap-chart" style="height:260px"></div>'+
      '<div class="cap-sub2" style="margin-top:14px">六因子分解(z 偏差;紅=對應方向加壓)</div>'+
      '<div style="max-width:520px;margin-top:6px">'+factorBars+'</div>'+
      '<div class="legend" style="margin-top:10px">資料來源:FRED + Yahoo Finance。PI 為六因子加權 z 分數合成，視窗 '+esc(PI_WIN_LABEL[win]||win)+'。'+(inv?'<b>(反轉視角:線與卡為 −PI;下方六因子仍為原始壓力口徑)</b>':'')+'</div>'+
    '</section>';

  // 繪圖：依窗口截取最近 N 筆，讓 x 軸範圍隨窗口縮放
  const ser = d.series || {};
  const allDates = ser.dates   || [];
  const allSp500 = ser.sp500   || [];
  const allPiSer = (ser.pi_by_window||{})[win] || [];
  const WIN_N = {"1m":21,"3m":63,"6m":126,"1y":252,"3y":756,"5y":1260};
  const n = Math.min(WIN_N[win] || allDates.length, allDates.length, allSp500.length, allPiSer.length);
  const dates  = allDates.slice(-n);
  const sp500  = allSp500.slice(-n);
  const piSer  = allPiSer.slice(-n);
  if(dates.length>=2 && piSer.length>=2){
    drawPiChart("piChart", dates, piSer, sp500, inv);
  } else {
    const c=$("#piChart"); if(c) c.innerHTML='<div class="legend">資料點不足，無法繪圖。</div>';
  }

  // 窗按鈕事件
  box.querySelectorAll("[data-piw]").forEach(b=>b.onclick=()=>{
    PI_WIN = b.dataset.piw;
    renderPI(PI_DATA);
  });
  const pib = box.querySelector("#piInvBtn");
  if(pib) pib.onclick=()=>{ PI_INV = !PI_INV; renderPI(PI_DATA); };
}

async function loadPI(){
  const box = $("#piBlock");
  if(!box) return;
  if(PI_DATA){ renderPI(PI_DATA); return; }   // 快取守衛：同 session 不重複 fetch
  box.innerHTML='<div class="dim" style="padding:8px">載入流動性壓力指數 …</div>';
  try{
    const res = await fetch("data/pi.json?t="+Date.now(), {cache:"no-store"});
    if(!res.ok) throw new Error(res.status);
    PI_DATA = await res.json();
    if(PI_DATA.default_window) PI_WIN = PI_DATA.default_window;
    renderPI(PI_DATA);

    if(box) box.innerHTML =
      '<section><div class="sec-head"><h2>流動性壓力指數(PI)</h2></div>'+
      '<div class="legend">⚠️ pi.json 尚未產生（'+esc(e.message)+'）。請先在 GitHub Actions 執行 export_pi。</div></section>';
  }
}

let US_THEME_CUSTOM=[];      // [{sym, theme}]

function _tfLoadCollapsed(){ try{ US_THEME_COLLAPSED=localStorage.getItem("usThemeFlowCollapsed")!=="0"; }catch(e){ US_THEME_COLLAPSED=true; } }

async function _tfFetchCustom(){
  const need=[...new Set(US_THEME_CUSTOM.map(c=>c.sym))].filter(s=>!US_THEME_CUSTOMQ[s]);
  for(let i=0;i<need.length;i+=5){
    const b=need.slice(i,i+5);
    try{
      const d=await (await fetch("/api/quotes?kline=1&kr=1y&syms="+encodeURIComponent(b.join(","))+"&t="+Date.now(),{cache:"no-store"})).json();
      const q=(d&&d.quotes)||{};
      b.forEach(s=>{ const cl=(q[s]&&q[s].closes)||[]; if(cl.length>2){ const L=cl.length-1, rN=n=>(L-n>=0&&cl[L-n])?+((cl[L]/cl[L-n]-1)*100).toFixed(2):null;
        US_THEME_CUSTOMQ[s]={r1:rN(1),r5:rN(5),r20:rN(20),r60:rN(60),close:cl[L],name:(q[s]&&q[s].name)||""}; }
        else US_THEME_CUSTOMQ[s]=US_THEME_CUSTOMQ[s]||{_miss:true}; });
    }catch(e){}
  }
}
function _tfAugmented(){   // 回傳 groups(深淺拷貝)+ 併入自訂成分股 + 重算有自訂的群組 avg/up_ratio/count
  const groups=(US_THEME_FLOW.groups||[]).map(g=>({...g, avg:{...(g.avg||{})}, members:[...(g.members||[])]}));
  const byTheme={}; groups.forEach(g=>byTheme[g.theme]=g);
  const touched=new Set();
  US_THEME_CUSTOM.forEach(c=>{
    const g=byTheme[c.theme]; if(!g) return;
    const q=US_THEME_CUSTOMQ[c.sym]||{};
    g.members=g.members.filter(m=>m.sym!==c.sym);   // 若原本已在,以自訂覆蓋(避免重複)
    g.members.unshift({sym:c.sym, r1:q.r1, r5:q.r5, r20:q.r20, r60:q.r60, close:q.close, method:"自訂", _custom:true});
    touched.add(g.theme);
  });
  groups.forEach(g=>{
    if(!touched.has(g.theme)) return;
    const mem=g.members, mean=k=>{ const v=mem.map(m=>m[k]).filter(x=>x!=null); return v.length?+(v.reduce((a,b)=>a+b,0)/v.length).toFixed(2):null; };
    g.avg={r1:mean("r1"),r5:mean("r5"),r20:mean("r20"),r60:mean("r60")};
    g.count=mem.length; g._hasCustom=true;
    const up=mem.filter(m=>m.r1>0).length, tot=mem.filter(m=>m.r1!=null).length;
    g.up_ratio=tot?+(up/tot*100).toFixed(1):null;
  });
  return groups;
}

function _tfFlowScore(g){
  const a=g.avg||{}, r1=a.r1||0, r5=a.r5||0, r20=a.r20||0, r60=a.r60||0;
  return +(r1*0.15 + r5*0.25 + r20*0.3 + r60*0.3).toFixed(2);

function _tfFlowShort(g){ const a=g.avg||{}; return +(((a.r1||0)*0.35 + (a.r5||0)*0.65).toFixed(2)); }
function _tfFlowNames(gs, n=3){ return gs.slice(0,n).map(g=>'<b>'+esc(g.theme)+'</b>').join('、') || '<span class="dim">—</span>'; }
function _tfFlowSummary(groups){
  const ranked=[...groups].filter(g=>g.avg&&g.avg.r5!=null&&g.avg.r20!=null&&g.avg.r60!=null)
    .map(g=>({...g,_score:_tfFlowScore(g),_short:_tfFlowShort(g)}));
  const shortIn=[...ranked].filter(g=>g._short>0&&g.avg.r20>0).sort((a,b)=>b._short-a._short);
  const longIn=[...ranked].filter(g=>g.avg.r20>0&&g.avg.r60>0).sort((a,b)=>b._score-a._score);
  const cooling=[...ranked].filter(g=>g._short<0&&g.avg.r60>0).sort((a,b)=>a._short-b._short);
  const outflow=[...ranked].filter(g=>g._short<0&&g.avg.r20<0&&g.avg.r60<0).sort((a,b)=>a._score-b._score);
  const bias = longIn.length && _tfFlowScore(longIn[0])>8 ? '偏多輪動' : (outflow.length>=3 ? '偏防守/退潮' : '分歧輪動');
  return '<div class="tf-summary-card">'+
    '<div class="tf-summary-title">資金流結論 <span class="tf-summary-bias">'+bias+'</span></div>'+
    '<div class="tf-summary-grid">'+

function _optMaxPain(calls,puts){
  const ks=[...new Set(calls.map(c=>c.strike).concat(puts.map(p=>p.strike)))].sort((a,b)=>a-b);
  let best=null,bv=Infinity;
  for(const K of ks){ let t=0;
    for(const c of calls){ if(K>c.strike) t+=(K-c.strike)*(c.oi||0); }
    for(const p of puts){ if(K<p.strike) t+=(p.strike-K)*(p.oi||0); }
    if(t<bv){ bv=t; best=K; } }
  return best;
}

// 個股選擇權異常偵測:Vol/OI 異常、今日爆量 Top5、IV 離群、PCR 極端旗標。
function _optAnomalies(d){
  const price=d.price, calls=d.calls||[], puts=d.puts||[];
  const pct=k=>price?((k/price-1)*100):null;
  const tag=(t,k)=>price?((t==="C"?(k<price):(k>price))?"價內":"價外"):"";
  const mkVOI=(arr,t)=>arr.filter(o=>(o.vol||0)>=200&&(o.oi||0)>0&&(o.vol/o.oi)>=2)
    .map(o=>({t,strike:o.strike,vol:o.vol,oi:o.oi,ratio:o.vol/o.oi,pct:pct(o.strike),m:tag(t,o.strike)}));
  const volOi=mkVOI(calls,"C").concat(mkVOI(puts,"P")).sort((a,b)=>b.ratio-a.ratio).slice(0,12);
  const topVol=(arr,t)=>arr.filter(o=>(o.vol||0)>0).slice().sort((a,b)=>b.vol-a.vol).slice(0,5)
    .map(o=>({t,strike:o.strike,vol:o.vol,oi:o.oi,pct:pct(o.strike),m:tag(t,o.strike)}));
  const ivLeg=(arr,t)=>{ const a=arr.filter(o=>o.iv!=null&&(o.vol||0)>=50).slice().sort((x,y)=>x.strike-y.strike), out=[];
    for(let i=0;i<a.length;i++){ const nb=[]; for(let j=Math.max(0,i-2);j<=Math.min(a.length-1,i+2);j++) if(j!==i) nb.push(a[j].iv);
      if(!nb.length) continue; nb.sort((x,y)=>x-y); const med=nb[Math.floor(nb.length/2)];
      if(med>0&&a[i].iv>med*1.4) out.push({t,strike:a[i].strike,iv:a[i].iv,med,pct:pct(a[i].strike),m:tag(t,a[i].strike)}); }
    return out; };
  const ivOut=ivLeg(calls,"C").concat(ivLeg(puts,"P")).sort((a,b)=>(b.iv/b.med)-(a.iv/a.med)).slice(0,8);
  return {volOi, topCall:topVol(calls,"C"), topPut:topVol(puts,"P"), ivOut};
}

function _maSeries(cdl,n){ const out=[]; for(let i=0;i<cdl.length;i++){ if(i<n-1||cdl[i].c==null){out.push({t:cdl[i].t,v:null});continue;} let s=0,ok=1;for(let j=i-n+1;j<=i;j++){ if(cdl[j].c==null){ok=0;break;} s+=cdl[j].c;} out.push({t:cdl[i].t,v:ok?s/n:null}); } return out; }
function _crossSignals(cdl,sn,ln){ const sm=_maSeries(cdl,sn),lm=_maSeries(cdl,ln),out=[]; for(let i=1;i<cdl.length;i++){ const ps=sm[i-1].v,pl=lm[i-1].v,cs=sm[i].v,cl=lm[i].v; if(ps==null||pl==null||cs==null||cl==null)continue; if(ps<=pl&&cs>cl)out.push({t:cdl[i].t,price:cdl[i].c,type:"golden"}); else if(ps>=pl&&cs<cl)out.push({t:cdl[i].t,price:cdl[i].c,type:"death"}); } return out; }
function _overallRating(m){ if(!m)return "中"; let s=0;
  if(m.roe!=null){ if(m.roe>0.15)s++; else if(m.roe<0.05)s--; }
  if(m.rev_growth!=null){ if(m.rev_growth>0.15)s++; else if(m.rev_growth<0)s--; }

// 由收盤價×量(時間衰減)估算成本分布——輕量頁無高低價,以收盤計
function _chipFromCloses(cl, vl, lb){
  if(!cl||!vl||cl.length<10) return null;
  const m=Math.min(lb, cl.length, vl.length);
  const c=cl.slice(cl.length-m), v=vl.slice(vl.length-m);
  let pmin=Infinity,pmax=-Infinity;
  for(const x of c){ if(x!=null){ pmin=Math.min(pmin,x); pmax=Math.max(pmax,x); } }
  if(!isFinite(pmin)) return null;
  const bins=40, span=(pmax-pmin)||1, bw=span/bins, chips=new Array(bins).fill(0), n=c.length;
  const hl=Math.max(20,lb/3), lam=Math.LN2/hl;
  for(let i=0;i<n;i++){ if(c[i]==null||v[i]==null) continue;
    const w=Math.exp(-lam*(n-1-i))*v[i];
    let b=Math.floor((c[i]-pmin)/bw); if(b<0)b=0; if(b>=bins)b=bins-1; chips[b]+=w; }
  const prices=chips.map((_,b)=>pmin+(b+0.5)*bw), total=chips.reduce((a,b)=>a+b,0)||1;
  return {chips,prices,total};
}
function drawLiveChip(q){
  const el=document.getElementById("liveChip"); if(!el||!window.echarts) return;
  const r=_chipFromCloses(q.closes,q.volumes,LIVE_CHIP_LB);
  if(!r){ el.innerHTML='<div class="legend">資料不足以估算。</div>'; return; }
  const price=q.price, cats=r.prices.map(p=>p.toFixed(2));
  const bars=r.chips.map((vv,i)=>({value:+(vv/r.total*100).toFixed(3),
    itemStyle:{color:(price!=null&&r.prices[i]>price)?"#e11d48":"#16a34a"}}));
  const ch=echarts.getInstanceByDom(el)||echarts.init(el,null,{renderer:"canvas"});
  let nr=cats[0],bd=Infinity; cats.forEach(cc=>{const dd=Math.abs(+cc-(price||0));if(dd<bd){bd=dd;nr=cc;}});
  ch.setOption({grid:{left:58,right:24,top:8,bottom:24},
    tooltip:{trigger:"axis",axisPointer:{type:"shadow"},formatter:ps=>'價位 '+cats[ps[0].dataIndex]+'<br>籌碼 '+ps[0].value+'%'},
    xAxis:{type:"value",axisLabel:{fontSize:9,formatter:v=>v+"%"},splitLine:{lineStyle:{opacity:.3}}},
    yAxis:{type:"category",data:cats,axisLabel:{fontSize:9,interval:Math.max(0,Math.floor(cats.length/14))},axisTick:{show:false}},
    series:[{type:"bar",data:bars,barWidth:"92%",
      markLine:price!=null?{silent:true,symbol:"none",data:[{yAxis:nr,lineStyle:{color:"#2563eb",type:"dashed",width:1.5},label:{formatter:"現價 "+(+price).toFixed(2),fontSize:10,color:"#2563eb",position:"insideEndTop"}}]}:undefined}]},true);
  let above=0,below=0,wsum=0; r.chips.forEach((vv,i)=>{ wsum+=vv*r.prices[i]; if(price!=null){ if(r.prices[i]>price) above+=vv; else below+=vv; } });
  const se=document.getElementById("liveChipSum");
  if(se) se.innerHTML='平均成本 <b>'+(wsum/r.total).toFixed(2)+'</b>'+(price!=null?' · 上方套牢 <b class="neg">'+(above/r.total*100).toFixed(1)+'%</b> · 下方獲利 <b class="pos">'+(below/r.total*100).toFixed(1)+'%</b>':'');
  document.querySelectorAll(".livechip-lb").forEach(b=>b.onclick=()=>{ LIVE_CHIP_LB=+b.dataset.n;
    document.querySelectorAll(".livechip-lb").forEach(x=>x.classList.toggle("on",+x.dataset.n===LIVE_CHIP_LB)); drawLiveChip(q); });
  if(!el._ro){ el._ro=()=>ch.resize(); window.addEventListener("resize",el._ro); }
}

async function doSearch(){
  const raw = ($("#searchInput").value||"").trim();
  if(!raw) return;
  await loadStockIndex();
  const syms = (STOCK_IDX&&STOCK_IDX.syms)||[];

  // 1) 代號(數字 / 帶 .TW.TWO / 英文代號如 NVDA)→ 1700檔內開詳情,否則即時報價卡
  if(/^[A-Za-z0-9][A-Za-z0-9.\-=^]*$/.test(raw)){
    const target = resolveSymByCode(syms, raw);
    if(target){ openStock(target); return; }
    showLiveQuote(raw);
    return;
  }

  // 2) 中文名：精確優先，部分比對多筆則列出讓使用者選
  const ni = await loadNames();
  const {exact, matches} = lookupByName(ni, raw);
  if(exact){ gotoSym(exact, syms); return; }
  if(matches.length===1){ gotoSym(matches[0].sym, syms); return; }
  if(matches.length>1){
    const top = matches.slice(0,12).map(x=>{
      const code = x.sym.replace(/\.(TW|TWO)$/,"");
      return '<a href="#" data-stk="'+esc(x.sym)+'" style="margin-right:12px;white-space:nowrap">'+
        esc(x.name)+'（'+esc(code)+'）</a>';
    }).join("");
    banner("🔍「"+esc(raw)+"」符合 "+matches.length+" 檔，請點選："+top+(matches.length>12?" …":""));
    return;
  }
  banner("🔍 找不到「"+esc(raw)+"」。可用「數字代號」(如 2317) 或「完整/部分公司中文名」(如 鴻海) 搜尋。");
}
const _si = $("#searchInput");
if(_si){
  _si.addEventListener("keydown", e=>{ if(e.key==="Enter" && !e.isComposing && e.keyCode!==229) doSearch(); });
  _si.addEventListener("input", ()=>{ if(!_si.value.trim()) document.querySelectorAll("tr.hit").forEach(tr=>tr.classList.remove("hit")); });
}
// banner 內「多筆符合」的連結 → 開該股（沿用全域 .clickable[data-stk] 委派之外，這裡 a 標籤另接）
document.addEventListener("click", function(e){
  const a = e.target.closest && e.target.closest("#banner a[data-stk]");
  if(!a) return;
  e.preventDefault();
  if(typeof openStock==="function") openStock(a.dataset.stk);
});

// ── 更新按鈕：觸發 GitHub Actions repository_dispatch ──
$("#refreshBtn").onclick = async ()=>{
  const btn=$("#refreshBtn"), banner=$("#banner");
  if(!GH_OWNER||!GH_REPO||!GH_DISPATCH_TOKEN){
    banner.className="banner show";
    banner.innerHTML="ℹ️ 尚未設定雲端觸發。請到 GitHub repo 的 Actions 手動跑 <b>export-and-deploy</b>，或依 DEPLOY.md 填入 GH_OWNER / GH_REPO / token 啟用一鍵更新。";
    return;
  }
  btn.classList.add("loading"); btn.disabled=true; $("#refreshLabel").textContent="觸發中…";
  try{
    const res=await fetch("https://api.github.com/repos/"+GH_OWNER+"/"+GH_REPO+"/dispatches",{
      method:"POST",
      headers:{"Accept":"application/vnd.github+json","Authorization":"Bearer "+GH_DISPATCH_TOKEN,"Content-Type":"application/json"},
      body:JSON.stringify({event_type:"refresh-data"})
    });
    banner.className="banner show";
    if(res.status===204){
      banner.style.color="var(--green)"; banner.style.borderColor="#1f5b3f"; banner.style.background="#0d2018";
      banner.innerHTML="✅ 已觸發雲端重抓。約 3–8 分鐘後資料更新完成，屆時重新整理本頁即可看到最新（標題列「更新」時間會變新）。";
    }else{
      banner.style.color="var(--red)"; banner.style.borderColor="#5b1f28"; banner.style.background="#200d10";
      banner.innerHTML="❌ 觸發失敗（HTTP "+res.status+"）。檢查 token 權限與 repo 名稱，詳見 DEPLOY.md。";
    }
  }catch(e){
    banner.className="banner show"; banner.innerHTML="❌ 觸發錯誤："+esc(e.message);
  }finally{
    btn.classList.remove("loading"); btn.disabled=false; $("#refreshLabel").textContent="🔄 更新資料";
  }
};

// ── 自動更新:每 N 分鐘重抓當前分頁,generated_at 變了才重繪(不閃、保留排序) ──
let _lastGen = {};
const AUTO_MS = 300000;   // 5 分鐘
function flashUpdated(){
  let t=document.getElementById("autoToast");
  if(!t){ t=document.createElement("div"); t.id="autoToast";
    t.style.cssText="position:fixed;right:14px;bottom:14px;background:var(--green);color:#fff;font-size:12.5px;font-weight:700;padding:8px 14px;border-radius:10px;box-shadow:0 4px 18px rgba(0,0,0,.22);z-index:60;opacity:0;transition:opacity .3s";
    document.body.appendChild(t); }
  t.textContent="✅ 資料已更新 "+new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"});
  t.style.opacity="1"; clearTimeout(t._h); t._h=setTimeout(()=>{t.style.opacity="0";},3000);
}
function refreshCurrent(){
  // 新聞分頁有自己的 60s 計時器;產業鏈/ETF 變動少且已快取 → 不在此自動刷新
  if(VIEW==="macro") loadMacro(true);
  else if(VIEW==="trend"||VIEW==="cross") load(true);
  const b=document.getElementById("autoBadge");
  if(b) b.textContent="🔄 自動更新 · 檢查 "+new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"});
}

// ── 啟動 ──
(async function init(){
  let idx=null;
  try{ idx=await (await fetch("data/index.json?t="+Date.now(),{cache:"no-store"})).json(); }catch(e){}
  renderTabs(idx);
  let startView="trend";   // F5 重整還原上次主分頁(無則預設趨勢動能榜)
  try{ const sv=localStorage.getItem("curView"); if(sv && NAV.some(n=>n.view===sv)) startView=sv; }catch(e){}
  switchView(startView);
  const b=document.createElement("div"); b.id="autoBadge";   // 自動更新指示徽章
  b.style.cssText="position:fixed;left:10px;bottom:10px;background:var(--panel);border:1px solid var(--line);color:var(--ink3);font-size:10.5px;padding:4px 9px;border-radius:8px;box-shadow:var(--shadow);z-index:40";
  b.textContent="🔄 自動更新 每5分"; document.body.appendChild(b);
  setInterval(refreshCurrent, AUTO_MS);
})();
</script>

(function(){

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault(); deferred = e;
    const btn = document.createElement("button");
    btn.textContent = "📲 安裝 App";
    btn.style.cssText = "position:fixed;right:12px;bottom:12px;z-index:50;background:#2563eb;color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(37,99,235,.4);cursor:pointer";
    btn.onclick = async () => { btn.remove(); if(deferred){ deferred.prompt(); await deferred.userChoice; deferred=null; } };
    document.body.appendChild(btn);
    window.addEventListener("appinstalled", () => btn.remove(), { once:true });
  });
})();

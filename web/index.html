<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股觀觀股 · 趨勢效率動能榜</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="股觀觀股">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<style>
  :root{
    --bg:#f6f8fb; --panel:#ffffff; --panel2:#f1f4f9; --line:#e3e8f0;
    --ink:#1a2433; --ink2:#5a6678; --ink3:#9aa6b6;
    --green:#16a34a; --red:#e11d48; --amber:#c98a00; --blue:#2563eb;
    --accent:#16a34a; --bluebar:#2563eb;
    --mono:'SF Mono',ui-monospace,'Cascadia Code','Consolas',monospace;
    --shadow:0 1px 2px rgba(16,30,54,.04),0 4px 16px rgba(16,30,54,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,'Segoe UI','PingFang TC','Microsoft JhengHei',sans-serif;
    font-feature-settings:"tnum";-webkit-font-smoothing:antialiased}
  a{color:var(--blue)}
  .wrap{max-width:1280px;margin:0 auto;padding:20px 20px 80px}

  /* 頂部 logo 列 */
  header{display:flex;align-items:center;justify-content:space-between;
    gap:16px;flex-wrap:wrap;padding:14px 0 16px;margin-bottom:4px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{width:42px;height:42px;border-radius:50%;flex:none;
    background:linear-gradient(135deg,var(--blue),#1e40af);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;
    letter-spacing:.5px;box-shadow:var(--shadow)}
  .title{display:flex;flex-direction:column;gap:2px}
  .title h1{margin:0;font-size:19px;letter-spacing:.2px;font-weight:760}
  .title h1 .dot{color:var(--accent)}
  .title .sub{color:var(--ink2);font-size:12.5px}
  .head-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:flex-end}
  .search{display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);
    border-radius:9px;padding:7px 12px;box-shadow:var(--shadow)}
  .search input{border:none;outline:none;background:transparent;font-size:13px;color:var(--ink);
    width:150px;font-family:var(--mono);letter-spacing:.5px}
  .search input::placeholder{color:var(--ink3)}
  .search .sicon{color:var(--ink3);font-size:13px}
  .meta{font-family:var(--mono);font-size:11.5px;color:var(--ink3);text-align:right;line-height:1.7}
  .meta b{color:var(--ink2);font-weight:600}

  /* 主分頁(總體市場 | 趨勢動能榜)：底線式分頁，模仿參考站 */
  .mainnav{display:flex;flex-wrap:nowrap;overflow-x:auto;gap:4px;border-bottom:1px solid var(--line);margin:14px 0 4px;scrollbar-width:thin}
  .mtab{background:none;border:none;cursor:pointer;font-size:14.5px;font-weight:650;white-space:nowrap;flex:none;
    color:var(--ink2);padding:10px 16px;position:relative;letter-spacing:.3px;transition:.12s}
  .mtab:hover{color:var(--ink)}
  .mtab.active{color:var(--blue)}
  .mtab.active::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2.5px;
    border-radius:2px;background:var(--blue)}
  .mtab{touch-action:manipulation;user-select:none;-webkit-user-select:none}
  .mtab.press{background:var(--panel2);border-radius:8px}
  .mtab.dragging{opacity:.55;background:var(--panel2);border-radius:8px;box-shadow:var(--shadow);cursor:grabbing}

  /* 指數總覽卡 */
  .idx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:4px}
  .m1m2-chart{width:100%;height:260px}
  .breadth-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:4px}
  .breadth-panel{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:13px 14px;min-width:0;box-shadow:var(--shadow)}
  .breadth-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
  .breadth-head h3{margin:0;font-size:14px;font-weight:760}
  .breadth-date{font-family:var(--mono);font-size:11px;color:var(--ink3);white-space:nowrap}
  .breadth-ranges{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 10px}
  .breadth-range{border:1px solid var(--line);background:var(--panel2);color:var(--ink2);border-radius:8px;
    padding:5px 9px;font-family:var(--mono);font-size:11px;font-weight:760;cursor:pointer}
  .breadth-range:hover{color:var(--ink);border-color:var(--blue)}
  .breadth-range.active{background:var(--blue);border-color:var(--blue);color:white}
  .breadth-cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px}
  .breadth-metric{border:1px solid var(--line);border-radius:8px;padding:8px 9px;background:var(--panel2);min-width:0}
  .breadth-metric .k{font-size:10.5px;color:var(--ink3);white-space:nowrap}
  .breadth-metric .v{font-family:var(--mono);font-size:17px;font-weight:760;line-height:1.15;margin-top:2px}
  .breadth-chart{width:100%;height:250px}
  .breadth-alert{margin-top:8px;padding:8px 10px;border-radius:8px;font-size:12px;font-weight:720;line-height:1.55;border:1px solid var(--line);background:var(--panel2)}
  .breadth-alert.bearish{border-color:var(--red);background:#fff5f6;color:var(--red)}
  .breadth-alert.bullish{border-color:var(--green);background:#f2fbf5;color:var(--green)}
  .breadth-alert.pending{color:var(--ink3)}
  .idx-card{border:1px solid var(--line);border-radius:12px;padding:13px 15px;background:var(--panel);
    box-shadow:var(--shadow)}
  .idx-card .ic-label{font-size:12.5px;color:var(--ink2);font-weight:650;margin-bottom:2px}
  .idx-card .ic-note{font-size:10.5px;color:var(--ink3);margin-bottom:7px}
  .idx-card .ic-val{font-family:var(--mono);font-size:21px;font-weight:740;letter-spacing:-.3px;line-height:1.1}
  .idx-card .ic-chg{font-family:var(--mono);font-size:13px;font-weight:700;margin-top:3px}
  .idx-card .ic-sub{font-size:10.5px;color:var(--ink3);margin-top:2px}
  /* 情緒極端值警示：紅(危險/過熱)、綠(超賣機會) 明顯閃爍 */
  .idx-card.alert-red{border-color:var(--red);background:#fff5f6;animation:pulseRed 1.1s ease-in-out infinite}
  .idx-card.alert-green{border-color:var(--green);background:#f2fbf5;animation:pulseGreen 1.1s ease-in-out infinite}
  .idx-card.alert-red .ic-val{color:var(--red)} .idx-card.alert-green .ic-val{color:var(--green)}
  .idx-card .alert-tag{display:inline-block;font-size:10px;font-weight:800;padding:1px 7px;border-radius:5px;margin-top:5px}
  .idx-card.alert-red .alert-tag{background:var(--red);color:#fff}
  .idx-card.alert-green .alert-tag{background:var(--green);color:#fff}
  .spark-wrap{position:relative;display:block;margin:6px 0 3px}
  .spark{width:100%;height:48px;display:block}
  .spark-thr{position:absolute;right:2px;transform:translateY(-50%);font-size:9px;font-weight:700;
    color:var(--red);background:rgba(255,255,255,.78);padding:0 3px;border-radius:3px;line-height:1.35;pointer-events:none;white-space:nowrap}
  .news-tabs{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 10px}
  .news-tabs .ntab{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;color:var(--ink)}
  .news-tabs .ntab:hover{background:#f3f6fb}
  .news-tabs .ntab.on{background:#1f6feb;border-color:#1f6feb;color:#fff}
  .news-list{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .news-row{display:block;background:var(--panel);padding:10px 14px;text-decoration:none;color:inherit;transition:background .12s}
  .news-row:hover{background:#f3f6fb}
  .news-meta{display:flex;gap:10px;align-items:center;font-size:11.5px;margin-bottom:3px}
  .news-src{font-weight:700;color:var(--blue)}
  .news-time{color:var(--ink3)}
  .news-title{font-size:14px;line-height:1.5;color:var(--ink)}
  .news-orig{font-size:12px;line-height:1.4;color:var(--ink3);margin-top:2px}
  .news-summary{font-size:13px;line-height:1.65;color:var(--ink2);margin-top:7px}
  .news-why{font-size:12.5px;line-height:1.55;color:var(--blue);font-weight:650;margin-top:5px}
  .news-more{display:inline-block;font-size:11px;line-height:1.4;color:var(--ink3);margin-top:6px}
  /* 財報/數據 行事曆 */
  .cal-datahead{font-weight:800;font-size:13px;color:var(--ink2);margin:4px 0 6px}
  .cal-day{margin:0 0 14px}
  .cal-date{font-weight:800;font-size:13.5px;color:var(--ink);padding:6px 0 4px;border-bottom:1px solid var(--line);margin-bottom:3px}
  .cal-wd{color:var(--ink3);font-weight:600;font-size:12px}
  .cal-cd{color:var(--blue);font-weight:700;font-size:11.5px;margin-left:4px}
  .cal-ev{display:flex;align-items:center;gap:9px;padding:6px 8px;border-radius:8px}
  .cal-ev:hover{background:var(--panel2)}
  .cal-time{font-family:var(--mono);font-size:12px;color:var(--ink2);min-width:46px}
  .cal-badge{font-size:11px;font-weight:700;padding:1px 7px;border-radius:6px;white-space:nowrap}
  .cal-badge.econ{background:#eaf2ff;color:var(--blue)}
  .cal-badge.earn{background:#fff3e0;color:#b9770e}
  .cal-badge.inv{background:#f0ecff;color:#7c4dff}
  .cal-badge.sess{margin-left:4px}
  .cal-badge.sess.bmo{background:#fff4e0;color:#c2750a}
  .cal-badge.sess.amc{background:#e6eefc;color:#3056b5}
  .tw-toggle{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:2px 0 12px}
  .tw-tg-lab{font-size:12px;color:var(--ink3)}
  .tw-tg{font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--ink2);cursor:pointer}
  .tw-tg.on{background:var(--blue);border-color:var(--blue);color:#fff}
  .cap-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:6px 0 4px}
  .cap-card{border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:var(--panel)}
  .cap-lab{font-size:12px;color:var(--ink3);margin-bottom:4px}
  .cap-big{font-size:21px;font-weight:800;letter-spacing:-.5px}
  .cap-u{font-size:12px;font-weight:600;color:var(--ink3);margin-left:2px}
  .cap-chg{font-size:12px;color:var(--ink2);margin-top:3px}
  .cap-sub2{font-size:12.5px;color:var(--ink2);margin:8px 0 4px}
  .cap-chart{width:100%;height:240px;margin:6px 0}
  .cap-ranks{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
  .cap-rank{border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .cap-rank-h{font-size:13px;font-weight:700;padding:7px 10px;color:#fff}
  .cap-rank-h.buy{background:#d13a4a} .cap-rank-h.sell{background:#1f9d57}
  .cap-tbl{width:100%;border-collapse:collapse;font-size:13px}
  .cap-tbl td{padding:5px 10px;border-top:1px solid var(--line);white-space:nowrap}
  .cap-tbl td:last-child{font-weight:600}
  .cap-tbl td.r,.cap-tbl th.r{text-align:right}
  .cap-tbl thead th{font-size:11px;color:var(--ink3);font-weight:600;padding:5px 10px;border-bottom:1px solid var(--line)}
  .cap-tbl th.hl{color:var(--blue)}
  .cap-nm{color:var(--ink2);max-width:0;width:60%;overflow:hidden;text-overflow:ellipsis}
  .cap-tbl.wide th{font-size:12px;color:var(--ink3);text-align:right;padding:6px 10px;border-bottom:1px solid var(--line)}
  .cap-tbl.wide th:first-child{text-align:left}
  .cap-tbl.wide td{text-align:right}
  .cap-tbl.wide td:first-child{text-align:left}
  .cal-dot{display:inline-block;width:7px;height:7px;border-radius:50%}
  .cal-dot.hi{background:var(--red)} .cal-dot.mid{background:var(--amber)}
  .cal-title{font-size:13.5px;color:var(--ink);font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cal-sub{font-size:11px;color:var(--ink3);white-space:nowrap}
  .cal-val{font-size:12px;color:var(--ink2);white-space:nowrap;font-weight:500}   /* 前值/實際:深色、手機也顯示 */
  .idx-card .src-link{display:inline-block;margin-top:5px;font-size:10.5px;color:var(--blue);text-decoration:none;font-weight:600}
  .idx-card .src-link:hover{text-decoration:underline}
  /* 持股分析 */
  .hold-input textarea{width:100%;min-height:96px;border:1px solid var(--line);border-radius:11px;padding:11px 13px;
    font-family:var(--mono);font-size:13px;line-height:1.7;resize:vertical;background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
  .hold-input textarea:focus{outline:none;border-color:var(--blue)}
  .hold-btns{display:flex;gap:10px;align-items:center;margin:9px 0 6px;flex-wrap:wrap}
  .hold-add{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:2px 0 14px}
  .pool-sec{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:0 0 16px;background:var(--panel2)}
  .pool-head{display:flex;align-items:center;gap:10px;margin:0 0 8px}
  .pool-name{font-size:15px;font-weight:800;color:var(--ink);background:transparent;border:none;border-bottom:1px dashed transparent;padding:2px 2px;min-width:90px;max-width:220px}
  .pool-name:hover{border-bottom-color:var(--line)} .pool-name:focus{outline:none;border-bottom-color:var(--blue)}
  .pool-del{font-size:12px;padding:3px 9px;border-radius:7px;border:1px solid var(--line);background:var(--panel);color:var(--ink3);cursor:pointer}
  .pool-del:hover{background:#fdf0f3;color:var(--red);border-color:#f0c8d0}
  .pool-add{font-size:13.5px;font-weight:700;padding:8px 16px;border-radius:9px;border:1px dashed var(--line);background:transparent;color:var(--blue);cursor:pointer}
  .pool-add:hover{border-color:var(--blue);background:var(--panel)}
  #holdInput,.holdInput{font-family:var(--mono);font-size:13.5px;padding:8px 13px;border-radius:9px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);box-shadow:var(--shadow);min-width:230px;flex:0 1 280px}
  #holdInput:focus,.holdInput:focus{outline:none;border-color:var(--blue)}
  .hold-del{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:13px;padding:2px 7px;border-radius:6px;transition:.12s}
  .hold-del:hover{background:#fdf0f3;color:var(--red)}
  .hl-tag{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:5px;white-space:nowrap;display:inline-block;margin:1px 0}
  .hl-tag.strong{background:#e6f6ec;color:var(--green)} .hl-tag.warn{background:#fdf0f3;color:var(--red)} .hl-tag.mid{background:#fff5db;color:var(--amber)}
  @keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(225,29,72,.0)}50%{box-shadow:0 0 0 4px rgba(225,29,72,.28),0 0 14px rgba(225,29,72,.4)}}
  @keyframes pulseGreen{0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,.0)}50%{box-shadow:0 0 0 4px rgba(22,163,74,.28),0 0 14px rgba(22,163,74,.4)}}
  .breadth-alert-green{animation:pulseGreen 1.1s ease-in-out infinite;border-radius:6px}
  .breadth-alert-red{animation:pulseRed 1.1s ease-in-out infinite;border-radius:6px}
  @keyframes blinkDot{0%,49%{opacity:1}50%,100%{opacity:.12}}
  .blink-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--red);
    box-shadow:0 0 6px rgba(225,29,72,.85);margin-left:5px;vertical-align:middle;animation:blinkDot .7s steps(1,end) infinite}
  td.below-buy{color:var(--red);font-weight:700}
  .buy-in{width:64px;font-family:var(--mono);font-size:12.5px;padding:3px 6px;border-radius:6px;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);text-align:right}
  .buy-in:focus{outline:none;border-color:var(--blue)}
  th.sortable{cursor:pointer;user-select:none;white-space:nowrap} th.sortable:hover{color:var(--blue)}
  th.sortable .sar{font-size:9px;opacity:.55;margin-left:2px}
  td.sym.clk{cursor:pointer;color:var(--blue)} td.sym.clk:hover{text-decoration:underline}
  @media (prefers-reduced-motion: reduce){.idx-card.alert-red,.idx-card.alert-green,.breadth-alert-green,.breadth-alert-red{animation:none}}

  .toolbar{display:flex;align-items:center;justify-content:space-between;
    gap:12px;flex-wrap:wrap;margin:16px 0 14px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{font-family:var(--mono);font-size:13px;padding:7px 15px;border-radius:9px;
    border:1px solid var(--line);background:var(--panel);color:var(--ink2);
    cursor:pointer;transition:.12s;letter-spacing:.5px;box-shadow:var(--shadow)}
  .tab:hover{color:var(--ink);border-color:#c5d0e0}
  .tab.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:700;
    box-shadow:0 2px 8px rgba(37,99,235,.25)}
  .tab .cur{opacity:.65;font-size:11px;margin-left:5px}

  .btn{font-family:var(--mono);font-size:13px;padding:8px 16px;border-radius:9px;
    border:1px solid var(--line);background:var(--panel);
    color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:.12s;
    box-shadow:var(--shadow)}
  .btn:hover{border-color:var(--blue);color:var(--blue)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn .spin{width:13px;height:13px;border:2px solid #00000015;border-top-color:var(--blue);
    border-radius:50%;animation:sp .7s linear infinite;display:none}
  .btn.loading .spin{display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}

  .note{font-size:12px;color:var(--ink3);margin:2px 0 18px;line-height:1.6}
  .banner{background:#fff8e6;border:1px solid #f0d488;color:#8a6400;
    padding:10px 14px;border-radius:9px;font-size:13px;margin:12px 0;display:none}
  .banner.show{display:block}

  section{margin:24px 0}
  /* 區塊標題：左側藍色直條(模仿參考站) */
  .sec-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;flex-wrap:wrap;
    padding-left:12px;position:relative}
  .sec-head::before{content:"";position:absolute;left:0;top:1px;width:4px;height:17px;
    border-radius:2px;background:var(--bluebar)}
  .sec-head h2{margin:0;font-size:15px;font-weight:720;letter-spacing:.2px}
  .sec-head .tag{font-family:var(--mono);font-size:11px;color:var(--ink2);
    border:1px solid var(--line);background:var(--panel2);padding:2px 8px;border-radius:6px}
  .sec-head .hint{color:var(--ink3);font-size:12px}
  .tf-flow-toggle{margin-left:auto;border:1px solid var(--line);background:var(--panel);color:var(--ink2);
    border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:var(--shadow)}
  .tf-flow-toggle:hover{border-color:var(--blue);color:var(--blue)}
  .tf-flow-body{display:block}
  .tf-flow-body.collapsed{display:none}
  .tf-summary-meta{font-size:13px;color:var(--ink2);font-weight:600;margin:6px 0 8px;line-height:1.55}
  .tf-summary-card{margin:8px 0 14px;border:1px solid #bfd0e8;border-left:5px solid var(--blue);
    border-radius:10px;background:#f8fbff;box-shadow:var(--shadow);padding:12px 14px}
  .tf-summary-title{font-size:16px;font-weight:850;color:var(--ink);margin-bottom:10px}
  .tf-summary-bias{display:inline-block;margin-left:6px;padding:2px 9px;border-radius:999px;
    background:#e7f0ff;color:#1f5fbf;font-size:13px;font-weight:850}
  .tf-summary-grid{display:grid;grid-template-columns:repeat(2,minmax(260px,1fr));gap:9px 12px}
  .tf-flow-line{font-size:14px;line-height:1.65;color:var(--ink);background:#fff;border:1px solid #d9e3f2;
    border-radius:8px;padding:8px 10px}
  .tf-flow-line .lab{font-weight:850;margin-right:6px;white-space:nowrap}
  .tf-flow-line b{font-size:14.5px;color:var(--ink);font-weight:850}
  .tf-flow-line.short .lab{color:#0f8a4b}

// 排序權重：金叉>死叉；同狀態下「剛交叉(天數小)」排前面
function crossSortVal(r){
  if(r.cross_state==null) return -9999;
  const base = r.cross_state==="golden" ? 1000 : 0;
  const recency = r.cross_days!=null ? (200 - Math.min(r.cross_days,200)) : 0;
  return base + recency;

// 交叉訊號排序：天數小→前、cross_days==null 墊底、同天數 score 大→前。
// 與後端 _cross_sort_key 同口徑，前端即使吃到未排序資料也穩定。
function sortCrossRows(rows){
  return (rows||[]).slice().sort((a,b)=>{
    const da = a.cross_days==null ? Infinity : a.cross_days;
    const db = b.cross_days==null ? Infinity : b.cross_days;
    if(da!==db) return da-db;
    return (b.score||0)-(a.score||0);
  });
}
// 從 cross_signals 取「近 fresh_days 天剛觸發」：合併 golden+death、排除無天數、依天數排序。

  if(!cs) return [];
  const fd = cs.fresh_days!=null ? cs.fresh_days : 3;
  const all = (cs.golden||[]).concat(cs.death||[]);
  return sortCrossRows(all.filter(r=>r.cross_days!=null && r.cross_days<=fd));

// ── 可排序表格引擎 ───────────────────────────────────
// 每張表用「欄位定義陣列」描述；點欄頭→依該欄重排重繪（降序→升序切換，▼/▲ 箭頭）。
// 不可排序欄（#序號、代號、單向性、範圍、旗標）sortKey 設 null。
// flag 旗標排序權重：up(2) > flat(1) > down(0)。
const SORT_STATE = {};   // tableId -> {key, dir}  dir: 'desc'|'asc'
const TABLE_CACHE = {};  // tableId -> {rows, cols, opts}
const FLAG_RANK = {up:2, flat:1, down:0};

function buildTable(tableId, rows, cols, opts){
  opts = opts || {};
  TABLE_CACHE[tableId] = {rows: rows, cols: cols, opts: opts};
  if(opts.empty && !rows.length) return '<div class="note">'+opts.empty+'</div>';
  return '<div class="tbl-wrap" id="'+tableId+'">'+tableInner(tableId)+'</div>';
}

function tableInner(tableId){
  const c = TABLE_CACHE[tableId];
  const rows = c.rows, cols = c.cols, opts = c.opts;
  const st = SORT_STATE[tableId];

  // 排序（不動原陣列）。有 st 用 st；否則用預設順序（rows 既有順序）。
  let view = rows.slice();
  if(st){
    const col = cols.find(x=>x.key===st.key);
    if(col){
      const dir = st.dir==='asc' ? 1 : -1;
      view.sort((a,b)=>{
        let va=col.sortVal?col.sortVal(a):a[col.key];
        let vb=col.sortVal?col.sortVal(b):b[col.key];
        if(col.type==='str'){ va=(va==null?'':String(va)); vb=(vb==null?'':String(vb)); return va<vb?-1*dir:(va>vb?dir:0); }
        va=(va==null?-Infinity:Number(va)); vb=(vb==null?-Infinity:Number(vb));
        return (va-vb)*dir;
      });
    }
  }

  // 表頭
  const ths = cols.map((col,ci)=>{
    if(col.key==null) return '<th>'+col.h+'</th>';
    const sorted = st && st.key===col.key;
    const arr = sorted ? (st.dir==='asc'?'▲':'▼') : '▼';
    return '<th class="sortable'+(sorted?' sorted':'')+'" data-tid="'+tableId+'" data-key="'+col.key+'">'+col.h+'<span class="arr">'+arr+'</span></th>';
  }).join("");

  // 表身（#序號永遠是顯示順序 1..n；其餘呼叫 col.cell(r)）
  const body = view.map((r,i)=>'<tr'+(r&&r.sym?' data-sym="'+esc(r.sym)+'"':'')+'>'+cols.map(col=>{
    if(col.rownum) return '<td>'+(i+1)+'</td>';
    return col.cell(r,i);
  }).join("")+'</tr>').join("");

  return '<table><thead><tr>'+ths+'</tr></thead><tbody>'+body+'</tbody></table>';
}

// 金叉綜合評分(0~100):把 5 年回測五指標標準化後加權,再乘樣本信心。
// 權重:勝率30% + 賺賠比30% + 平均賺15% + 平均賠(典型下檔)10% + 最差(尾端風險)15%;樣本<10 折扣。
function _crossBtScore(r){
  if(r.bt_n==null || r.bt_win_rate==null) return null;
  const clamp=(x)=>x<0?0:(x>1?1:x);
  const win = clamp((r.bt_win_rate||0)/100);                      // 0~100% → 0~1
  const pl  = r.bt_pl_ratio==null?0:clamp((r.bt_pl_ratio-1)/2);   // 1.0→0、≥3.0→1
  const aw  = r.bt_avg_win==null?0:clamp(r.bt_avg_win/20);        // 0→0、≥+20%→1
  const al  = r.bt_avg_loss==null?0:clamp(1-Math.abs(r.bt_avg_loss)/10); // 0%→1、≥-10%→0
  const wo  = r.bt_worst==null?0:clamp(1-Math.abs(r.bt_worst)/30);// 單筆最差 0%→1、≤-30%→0(尾端風險)
  const raw = 0.30*win + 0.30*pl + 0.15*aw + 0.10*al + 0.15*wo;  // 0~1
  const conf = 0.6 + 0.4*clamp((r.bt_n||0)/10);                  // 樣本<10 折扣到 0.6
  return Math.round(raw*conf*100);
}

// 交叉訊號表格：代號/名稱・狀態・幾天前・5日漲%・5日評分・Score。沿用 buildTable。
// withBacktest=true 時加 金叉勝率/平均報酬/平均賺/平均賠/賺賠比/金叉評分/樣本(5年金叉完整波段回測)。
function crossSignalTable(tableId, rows, emptyMsg, withBacktest){
  const cols=[
    {h:"#", key:null, rownum:true},
    {h:"代號/名稱", key:"sym", type:"str", cell:r=>symCell(r.sym,r.name,r.sector_zh)},
    {h:"狀態", key:"cross", sortVal:crossSortVal,
      cell:r=>r.cross_state==="golden"?'<td><span class="pos">▲Buy</span></td>'
                                     :'<td><span class="neg">▼Sell</span></td>'},
    {h:"幾天前", key:"days",
      sortVal:r=>r.cross_days==null?9e9:r.cross_days,
      cell:r=>r.cross_days==null?'<td class="dim">—</td>'
             :r.cross_days===0?'<td><b>今日 <span style="color:var(--amber)">★</span></b></td>'
             :'<td class="dim">'+r.cross_days+' 天前</td>'},
    {h:"5日漲%", key:"r5", cell:r=>'<td class="'+cls(r.r5)+'">'+sgn(r.r5,1)+'%</td>'},
    {h:"5日評分", key:"sc5", cell:r=>'<td>'+fmtNum(r.sc5)+'</td>'},
    {h:"Score", key:"score", cell:r=>'<td>'+fmtNum(r.score)+'</td>'},
  ];
  if(withBacktest){
    cols.push(
      {h:"金叉勝率", key:"bt_win_rate",
        sortVal:r=>r.bt_win_rate==null?-1:r.bt_win_rate,
        cell:r=>r.bt_win_rate==null?'<td class="dim">–</td>'
               :'<td class="'+(r.bt_win_rate>=50?"pos":"neg")+'" style="font-weight:700">'+r.bt_win_rate.toFixed(0)+'%</td>'},
      {h:"平均報酬", key:"bt_avg",
        sortVal:r=>r.bt_avg==null?-1e9:r.bt_avg,
        cell:r=>r.bt_avg==null?'<td class="dim">–</td>':'<td class="'+cls(r.bt_avg)+'">'+sgn(r.bt_avg,1)+'%</td>'},
      {h:"平均賺", key:"bt_avg_win",
        sortVal:r=>r.bt_avg_win==null?-1e9:r.bt_avg_win,
        cell:r=>r.bt_avg_win==null?'<td class="dim">–</td>':'<td class="pos">'+sgn(r.bt_avg_win,1)+'%</td>'},
      {h:"平均賠", key:"bt_avg_loss",
        sortVal:r=>r.bt_avg_loss==null?1e9:r.bt_avg_loss,
        cell:r=>r.bt_avg_loss==null?'<td class="dim">–</td>':'<td class="neg">'+sgn(r.bt_avg_loss,1)+'%</td>'},
      {h:"賺賠比", key:"bt_pl_ratio",
        sortVal:r=>r.bt_pl_ratio==null?-1:r.bt_pl_ratio,
        cell:r=>r.bt_pl_ratio==null?'<td class="dim">–</td>'
               :'<td class="'+(r.bt_pl_ratio>=2?"pos":(r.bt_pl_ratio>=1?"":"neg"))+'" style="font-weight:600">'+r.bt_pl_ratio.toFixed(2)+'</td>'},
      {h:"最差", key:"bt_worst",
        sortVal:r=>r.bt_worst==null?-1e9:r.bt_worst,
        cell:r=>r.bt_worst==null?'<td class="dim">–</td>'
               :'<td class="'+(r.bt_worst<=-25?"neg":"dim")+'" style="'+(r.bt_worst<=-25?"font-weight:700":"")+'">'+sgn(r.bt_worst,1)+'%</td>'},
      {h:"金叉評分", key:"bt_score", sortVal:r=>{const s=_crossBtScore(r);return s==null?-1:s;},
        cell:r=>{const s=_crossBtScore(r); return s==null?'<td class="dim">–</td>'
               :'<td style="font-weight:800;color:'+(s>=70?"var(--green)":(s>=45?"var(--amber)":"var(--ink2)"))+'">'+s+'</td>';}},
      {h:"樣本", key:"bt_n",
        sortVal:r=>r.bt_n==null?-1:r.bt_n,
        cell:r=>r.bt_n==null?'<td class="dim">–</td>':'<td class="dim">'+r.bt_n+'</td>'}
    );
  }
  return buildTable(tableId, rows, cols, {empty:emptyMsg});
}

  }
  const hasBt = !!(cs && ((cs.golden||[]).some(r=>r.bt_win_rate!=null) || (cs.death||[]).some(r=>r.bt_win_rate!=null)));
  const fresh = freshCrosses(cs);
  const fd = cs.fresh_days!=null?cs.fresh_days:3;
  const freshGold = fresh.filter(r=>r.cross_state==="golden").length;
  const freshDeath = fresh.length - freshGold;

  const freshBlock = fresh.length
    ? crossSignalTable("t-cross-fresh", fresh, "近 "+fd+" 日無新交叉觸發。", hasBt)
    : '<div class="note">近 '+fd+' 日無新交叉觸發。</div>';

  $("#content").innerHTML =
    '<section>'+

async function fetchAndRenderCrossCustom(pid){
  let codes=holdCodes(pid); const box=_pq(pid,"holdResult");
  if(!box) return;
  if(codes.some(c=>/[一-鿿]/.test(c))){                       // 中文名就地轉代號(同持股)
    const ni=await loadNames().catch(()=>null); let changed=false;
    codes=codes.map(c=>{ if(/[一-鿿]/.test(c)&&ni){ const r=lookupByName(ni,c); const sym=r.exact||(r.matches[0]&&r.matches[0].sym); if(sym){changed=true;return sym.toUpperCase();} } return c; });
    codes=[...new Set(codes)]; if(changed) saveHoldCodes(codes,pid);
  }
  if(!codes.length){ box.innerHTML='<div class="legend">此股池尚未加入股票。上方輸入代號/繁中名按「+ 新增」即可。</div>'; return; }
  const cands=[...new Set(codes.flatMap(_holdCand))], batches=[];
  for(let i=0;i<cands.length;i+=5) batches.push(cands.slice(i,i+5));   // kline 模式上限 5 檔/批
  box.innerHTML='<div class="loading-screen">查詢 '+codes.length+' 檔近 5 年資料並計算金叉評分 …</div>';
  const Q={};
  const fetchBatch=async b=>{ for(let i=0;i<3;i++){ try{ const d=await (await fetch("/api/quotes?kline=1&kr=5y&syms="+encodeURIComponent(b.join(","))+"&t="+Date.now()+"_"+i,{cache:"no-store"})).json(); if(d&&d.quotes&&Object.keys(d.quotes).length) return d.quotes; }catch(e){} } return {}; };
  try{ const results=await Promise.all(batches.map(fetchBatch)); results.forEach(q=>Object.assign(Q,q||{})); }
  catch(e){ box.innerHTML='<div class="loading-screen">查詢失敗:'+esc(e.message)+'(需部署後 /api/quotes 才可用)</div>'; return; }
  const NI=await loadNames().catch(()=>null); const bySym=(NI&&NI.bySym)||{};
  const rows=codes.map(code=>{
    let qt=null,used=null; for(const c of _holdCand(code)){ if(Q[c]){qt=Q[c];used=c;break;} }
    if(!qt) return {sym:code, name:"", _miss:true};
    const cl=qt.closes||[];
    const cx=_holdCross(cl);
    const bt=_emaBacktest(cl.map(v=>({c:v}))); const st=bt&&bt.stat;
    const twNm=(/\.(TW|TWO)$/i.test(used)?bySym[used.toUpperCase()]:null);
    const row={ sym:used, name:twNm||qt.name||"", cross_state:cx.state, cross_days:cx.days,
      r5:(cl.length>5)?(cl[cl.length-1]/cl[cl.length-6]-1)*100:null, sc5:null, score:null };
    if(st){ row.bt_win_rate=st.win_rate; row.bt_avg=st.avg; row.bt_avg_win=st.avg_win;
      row.bt_avg_loss=st.avg_loss; row.bt_pl_ratio=st.pl_ratio; row.bt_worst=st.worst; row.bt_n=st.n; }
    return row;
  });
  const ok=rows.filter(r=>!r._miss), miss=rows.filter(r=>r._miss).map(r=>r.sym);
  ok.sort((a,b)=>{ const sa=a.cross_state==="golden"?1:0, sb=b.cross_state==="golden"?1:0; if(sa!==sb) return sb-sa;
    const xa=_crossBtScore(a), xb=_crossBtScore(b); return (xb==null?-1:xb)-(xa==null?-1:xa); });
  const ng=ok.filter(r=>r.cross_state==="golden").length, nd=ok.filter(r=>r.cross_state==="death").length;
  let html='<div class="legend" style="margin:2px 0 8px">本池 '+ok.length+' 檔 · 🟢金叉 '+ng+' ・ 🔴死叉 '+nd+'。</div>'+
    crossSignalTable("t-crossx-"+pid, ok, "（此股池查無可用資料）", true);
  if(miss.length) html+='<div class="legend">查無報價:'+miss.map(esc).join("、")+'</div>';
  box.innerHTML=html;
  if(_pushOn()) _updatePushWatchlist();   // 已訂閱 → 把最新自訂清單同步到伺服器(背景,無聲)
}

async function enablePush(scope){
  scope = (scope==="custom")?"custom":"all";
  try{
    if(!("serviceWorker" in navigator) || !("PushManager" in window)){ alert("此裝置/瀏覽器不支援推播。iPhone 請先用 Safari 開網站→分享→「加入主畫面」,再到 App 內開啟。"); return; }
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){ alert("未授權通知,無法開啟。可到系統/瀏覽器設定重新允許。"); return; }
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub) sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:_urlB64ToU8(VAPID_PUBLIC)});
    const r=await fetch("/api/push/subscribe",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({subscription:sub.toJSON?sub.toJSON():sub, watchlist:_allWatchCodes(), ua:navigator.userAgent, scope:scope})});
    const j=await r.json().catch(()=>({}));
    if(r.ok){
      try{localStorage.setItem("pushOn","1"); localStorage.setItem("pushScope",scope);}catch(e){}
      alert("✅ 已開啟金叉通知("+(scope==="custom"?"只我的股池,追蹤 "+(j.n||0)+" 檔":"全部池 / 全市場")+")。每交易日收盤後出現黃金交叉就會推播。");

    }
    else if(j.error==="push_not_configured") alert("⚠️ 推播後端尚未啟用(需先在 Cloudflare 綁定 KV)。請稍後再試。");
    else alert("訂閱失敗:"+(j.error||r.status));
  }catch(e){ alert("開啟通知失敗:"+(e&&e.message||e)); }
}
async function disablePush(){
  try{
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    if(sub){ try{ await fetch("/api/push/unsubscribe",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({subscription:sub.toJSON?sub.toJSON():sub})}); }catch(e){} await sub.unsubscribe(); }
    try{localStorage.removeItem("pushOn");}catch(e){}

}

    '<td>'+(i+1)+'</td>'+
    '<td class="sym clickable" data-stk="'+esc(r.sym)+'">'+esc(r.sym)+(r.name?'<span class="nm">'+esc(r.name)+'</span>':'')+'</td>'+
    '<td class="dim">'+r.n+'</td>'+
    '<td class="'+(r.win_rate>=50?"pos":"neg")+'" style="'+emph("勝率")+'">'+r.win_rate.toFixed(0)+'%</td>'+
    '<td class="'+cls(r.avg)+'" style="'+emph("平均")+'">'+sgn(r.avg,1)+'%</td>'+
    '<td class="'+cls(r.median)+'" style="'+emph("中位")+'">'+sgn(r.median,1)+'%</td>'+

    '<td class="neg">'+(r.avg_loss!=null?sgn(r.avg_loss,1)+'%':"–")+'</td>'+
    '<td class="'+plCls(r.pl_ratio)+'" style="font-weight:700">'+plFmt(r.pl_ratio)+'</td>'+
    '<td class="pos">'+sgn(r.best,1)+'%</td>'+
    '<td class="neg">'+sgn(r.worst,1)+'%</td>'+
    '<td class="dim">'+(r.avg_hold!=null?Number(r.avg_hold).toFixed(0)+'天':"–")+'</td></tr>').join("");
  return '<div class="tbl-wrap"><table><thead><tr>'+head.map((h,i)=>{
    const isSorted=h===sortedH;
    const style=(i===1?'text-align:left;':'')+(isSorted?'font-weight:800':'');
    return '<th'+(style?' style="'+style+'"':'')+'>'+h+(isSorted?' ↓':'')+'</th>';
  }).join("")+'</tr></thead><tbody>'+body+'</tbody></table></div>';
}

function fmtTime(iso){
  if(!iso) return "–";
  try{
    const d=new Date(iso);
    return d.toLocaleString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false});
  }catch(e){return iso}
}
// 大圖更新戳記:資料週期 <日期> · 更新時間:<星期X>。有到「日」的日期→算星期幾;只有到月/季→顯示頻率(每月/每季)
function updStamp(asOf, freq){
  if(!asOf) return "";
  const s=String(asOf).trim();
  let upd = freq || "";                    // 月/季頻直接標頻率(即使資料日是月底整日,也不算星期)
  if(!upd){                                // 只有日/週頻(未給 freq)才依實際資料日期算星期幾
    const m=s.match(/^(\d{4})-?(\d{2})-?(\d{2})/);
    if(m) upd = "星期"+"日一二三四五六".charAt(new Date(Date.UTC(+m[1],+m[2]-1,+m[3])).getUTCDay());
  }
  return '<div class="dim" style="font-size:12px;margin:2px 0 6px">資料週期 '+esc(s)+(upd?' · 更新時間:'+upd:'')+'</div>';
}

function filterBreadthSeries(b){
  const dates=b.dates||[], ad=b.ad_line||[], idx=b.index_series||[];
  const range=BREADTH_RANGES.find(x=>x[0]===breadthRange);
  const days=range?range[1]:366;
  if(!days || !dates.length) return {dates,ad,idx};
  const end=new Date(dates[dates.length-1]+"T00:00:00");
  const start=new Date(end);
  start.setDate(start.getDate()-days);
  let first=dates.findIndex(d=>new Date(d+"T00:00:00")>=start);
  if(first<0) first=0;
  return {dates:dates.slice(first),ad:ad.slice(first),idx:idx.slice(first)};
}

// 各情緒指標的極端值警示閾值。回傳 {cls, tag} 或 null。
function sentAlert(sym, level, diffPct){
  if(level==null) return null;
  switch(sym){
    case "^VIX":  // >28 恐慌(紅閃)、<13 過度自滿(綠=可能買點)
      if(level>=28) return {cls:"alert-red", tag:"🔴 恐慌"};
      if(level<13)  return {cls:"alert-green", tag:"🟢 過度自滿"};
      return null;
    case "^VXN":  // 那指版門檻略高
      if(level>=32) return {cls:"alert-red", tag:"🔴 恐慌"};
      if(level<18)  return {cls:"alert-green", tag:"🟢 過度自滿"};
      return null;
    case "^SKEW": // >150 尾部風險高(紅閃)
      if(level>=150) return {cls:"alert-red", tag:"🔴 尾部風險高"};
      return null;
    case "COR1M": // 隱含相關性越低=越自滿/脆弱(<=15 歷史低檔，紅閃)
      if(level<=15) return {cls:"alert-red", tag:"🔴 相關性極低·脆弱"};
      return null;
    case "HYG":   // 單日跌 >1% = 信用惡化(紅閃)
      if(diffPct!=null && diffPct<=-1) return {cls:"alert-red", tag:"🔴 信用轉弱"};
      return null;
    case "TWMICRORETAIL": // 反向:散戶極度偏多=過熱(紅)、極度偏空=可能底部(綠)。門檻暫定,待歷史校準
      if(level>=50)  return {cls:"alert-red",   tag:"🔴 散戶極度偏多·過熱"};
      if(level<=-20) return {cls:"alert-green", tag:"🟢 散戶極度偏空·可能底部"};
      return null;
    case "ODTE_PCR": // 0DTE 量比:>1.3 避險濃(偏空,紅)、<0.7 偏多(call多,綠)
      if(level>=1.3) return {cls:"alert-red",   tag:"🔴 0DTE 避險濃·偏空"};
      if(level<=0.7) return {cls:"alert-green", tag:"🟢 0DTE 偏多·call多"};
      return null;
    default: return null;
  }
}

const SENT_THR = {
  "^VIX":  [{v:28, dir:"hi", lab:"恐慌28"}, {v:15, lab:"自滿15", color:"#16a34a"}],   // 紅28恐慌 + 綠15自滿
  "^VXN":  {v:32,  dir:"hi", lab:"恐慌32"},
  "^SKEW": {v:150, dir:"hi", lab:"警戒150"},

function sparkline(data, col, thr){
  if(!data || data.length<2) return '';
  col = col || '#8b949e';
  const w=120, h=48, pad=4, n=data.length;
  const lines = thr ? (Array.isArray(thr)?thr:[thr]) : [];   // 支援多條標線:{v,dir?,lab?,color?}
  let min=Math.min.apply(null,data), max=Math.max.apply(null,data);
  lines.forEach(t=>{ min=Math.min(min,t.v); max=Math.max(max,t.v); });   // 讓標線進入可視範圍
  const rng=(max-min)||1;
  const X=i=> pad + i/(n-1)*(w-2*pad);
  const Y=v=> pad + (1-(v-min)/rng)*(h-2*pad);
  let line='';
  for(let i=0;i<n;i++){ line+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(data[i]).toFixed(1)+' '; }
  const area='M'+X(0).toFixed(1)+' '+(h-pad)+' '+
    data.map((v,i)=>'L'+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ')+
    ' L'+X(n-1).toFixed(1)+' '+(h-pad)+' Z';
  let marks='', labHtml='';
  lines.forEach(t=>{
    const cc=t.color||'#e11d48', ty=Y(t.v);
    if(t.dir){                                              // dir 才畫填色危險區
      const zoneY = t.dir==="hi" ? pad : ty;
      const zoneH = Math.max(0, t.dir==="hi" ? (ty-pad) : (h-pad-ty));
      marks+='<rect x="'+pad+'" y="'+zoneY.toFixed(1)+'" width="'+(w-2*pad)+'" height="'+zoneH.toFixed(1)+'" fill="'+cc+'14"/>';
    }
    marks+='<line x1="'+pad+'" y1="'+ty.toFixed(1)+'" x2="'+(w-pad)+'" y2="'+ty.toFixed(1)+'" '+
      'stroke="'+cc+'" stroke-width="1" stroke-dasharray="3 2" vector-effect="non-scaling-stroke"/>';
    if(t.lab) labHtml+='<span class="spark-thr" style="top:'+(ty/h*100).toFixed(1)+'%;color:'+cc+'">'+t.lab+'</span>';
  });
  return '<span class="spark-wrap"><svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+
    marks+
    '<path d="'+area+'" fill="'+col+'1f" stroke="none"/>'+
    '<path d="'+line+'" fill="none" stroke="'+col+'" stroke-width="1.3" '+
    'vector-effect="non-scaling-stroke" stroke-linejoin="round"/></svg>'+labHtml+'</span>';
}

function sentCard(r){
  const diff = r.diff!=null ? r.diff : r.diff_pct;
  const isPx = r.unit==="px";
  const isPct = r.unit==="pct";              // 比率型(如散戶多空比):值本身就是%,可正可負
  const isRatio = r.unit==="ratio";          // 純比值(如 0DTE PCR):顯示數字、不加單位
  const up = diff>0;
  const c = diff==null?"dim":(!isPx ? (up?"neg":"pos") : (up?"pos":"neg"));
  const sign = diff>0?"+":"";
  const diffTxt = (diff!=null?sign+diff:"–")+(isPx?"%":(isPct?" pt":(isRatio?"":" 點")));
  const al = sentAlert(r.sym, r.level, isPx?diff:null);
  const cls = al?(" "+al.cls):"";

    '<div class="ic-val">'+valTxt+'</div>'+

function _monthMs(lbl){ // 'May-26' -> Date(2026,4,1)
  const MON={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const p=String(lbl).split("-"); if(p.length<2||!(p[0] in MON)) return null;
  let y=+p[1]; y = y<=50 ? 2000+y : 1900+y;   // 世紀 pivot:26→2026、97→1997
  return new Date(y, MON[p[0]], 1).getTime();
}
function _marginSortBy(months, vals, idx){   // 依月份時序排序(防資料端次序異常),同步排 vals+idx
  const ord=months.map((m,i)=>i).filter(i=>_monthMs(months[i])!=null)
    .sort((a,b)=>_monthMs(months[a])-_monthMs(months[b]));
  const pick=(arr)=>ord.map(i=>(arr&&arr[i]!=null)?arr[i]:null);
  return { months:ord.map(i=>months[i]), vals:pick(vals), idx:pick(idx) };
}
function _marginSeries(d){
  const L=d.leverage||{}, T=d.tw_margin||{};
  const u=_marginSortBy(L.margin_months||L.months||[], L.margin_series||[], L.sp500_series||[]);
  const t=_marginSortBy(T.months||[], T.series||[], T.twii_series||[]);
  return { us:{ months:u.months, vals:u.vals, idx:u.idx, gdp:L.gdp_t },
           tw:{ months:t.months, vals:t.vals, idx:t.idx, as_of:T.as_of, mom:T.mom_pct } };
}

// 對 log(比值) 做時間線性回歸:回 {trend:每點長期趨勢值, pct:每點殘差在全史的去趨勢百分位}。
// 趨勢之上=偏貴(高百分位)、之下=偏便宜(低百分位),會上下擺盪,不會因長期上漂卡100%。
function _ndxFit(ratio){
  ratio=ratio||[];
  const xs=[], ys=[];
  ratio.forEach((v,i)=>{ if(v!=null&&v>0){ xs.push(i); ys.push(Math.log(v)); } });
  const n=xs.length;
  if(n<24) return {trend:ratio.map(()=>null), pct:ratio.map(()=>null)};
  const sx=xs.reduce((a,b)=>a+b,0), sy=ys.reduce((a,b)=>a+b,0);
  const sxx=xs.reduce((a,b)=>a+b*b,0), sxy=xs.reduce((a,b,k)=>a+b*ys[k],0);
  const slope=(n*sxy-sx*sy)/(n*sxx-sx*sx), intc=(sy-slope*sx)/n;
  const trend=ratio.map((v,i)=> +(Math.exp(intc+slope*i)).toFixed(1));
  const resid=ratio.map((v,i)=> (v!=null&&v>0)? Math.log(v)-(intc+slope*i) : null);
  const dist=resid.filter(v=>v!=null).sort((p,q)=>p-q);
  const pct=resid.map(r=> r==null?null : +(dist.filter(x=>x<=r).length/dist.length*100).toFixed(1));
  return {trend, pct};
}

function drawMarketChart(elId, s, marginName, marginColor, marginAxisName, idxName, win, opts){
  const el=document.getElementById(elId); if(!el||!window.echarts||!s.vals.length) return;
  opts=opts||{};

  const nWin=(WS.find(w=>w[0]===(win||MARGIN_WIN))||WS[2])[1];
  const n=Math.min(nWin, s.months.length);
  const mo=s.months.slice(-n), mv=s.vals.slice(-n), iv=(s.idx||[]).slice(-n);
  const mData=mo.map((m,i)=>{const t=_monthMs(m);return (t==null||mv[i]==null)?null:[t,mv[i]];}).filter(Boolean);
  const iData=mo.map((m,i)=>{const t=_monthMs(m);return (t==null||iv[i]==null)?null:[t,iv[i]];}).filter(Boolean);
  const hasIdx=iData.length>1;
  const idxCol=opts.idxColor||MARGIN_IDX_COL;           // 指數線顏色可覆寫(預設藍)
  const tv=(opts.trendLine||[]).slice(-n);              // 長期趨勢線(左軸,同 vals 單位),可選
  const tData=mo.map((m,i)=>{const t=_monthMs(m);return (t==null||tv[i]==null)?null:[t,tv[i]];}).filter(Boolean);
  const hasTrend=tData.length>1;
  const legendData=[marginName].concat(hasIdx?[idxName]:[]).concat(hasTrend?["長期趨勢"]:[]);
  const xMin=_monthMs(mo[0]), xMax=_monthMs(mo[n-1]);   // 明確鎖定,與月環比圖同時間尺
  const _old=echarts.getInstanceByDom(el); if(_old) _old.dispose();

  ch.setOption({
    grid:{left:60,right:62,top:30,bottom:28},
    legend:{top:0,right:0,itemWidth:16,itemHeight:8,textStyle:{fontSize:10},data:legendData},
    tooltip:{trigger:"axis",valueFormatter:v=>v==null?"—":Number(v).toLocaleString("en-US",{maximumFractionDigits:2})},
    xAxis:{type:"time",min:xMin,max:xMax,axisLabel:{fontSize:9,hideOverlap:true,
      formatter:v=>{const dt=new Date(v);const m=dt.getMonth();return m===0?dt.getFullYear()+"年":(m+1)+"月";}}},
    yAxis:[
      {type:"value",name:marginAxisName,position:"left",scale:true,nameTextStyle:{fontSize:10,color:marginColor},
        axisLabel:{fontSize:10},splitLine:{lineStyle:{opacity:.3}}},
      {type:"value",name:idxName,position:"right",scale:true,show:hasIdx,nameTextStyle:{fontSize:10,color:idxCol},
        axisLabel:{fontSize:10},splitLine:{show:false}}
    ],
    series:[

       lineStyle:{color:marginColor,width:2.4},itemStyle:{color:marginColor},areaStyle:opts.noArea?undefined:{color:marginColor,opacity:.06},
       markLine:(opts.refLines&&opts.refLines.length)?{silent:true,symbol:"none",
         data:opts.refLines.map(r=>({yAxis:r.value,lineStyle:{color:r.color,type:"dashed",width:1.2},
           label:{formatter:r.label,fontSize:9,color:r.color,position:"insideEndTop"}}))}
         :(opts.refLine!=null?{silent:true,symbol:"none",lineStyle:{color:"#94a3b8",type:"dashed",width:1},
           label:{formatter:opts.refLabel||"",fontSize:9,color:"#94a3b8",position:"insideEndTop"},
           data:[{yAxis:opts.refLine}]}:undefined)},
      {name:idxName,type:"line",smooth:true,showSymbol:false,yAxisIndex:1,data:iData,connectNulls:true,
       lineStyle:{color:idxCol,width:1.6,type:"dashed"},itemStyle:{color:idxCol}},
      {name:"長期趨勢",type:"line",smooth:true,showSymbol:false,yAxisIndex:0,data:tData,connectNulls:true,

function quoteCol(lbl,v){

// 依代號後綴判市場（吃完整 sym，後綴比對優先）。回傳 {mkt:標記字, cls:CSS類}。
function marketOf(sym){
  // ⚠ 後綴清單須與 memberCard 去後綴 regex 同步。
  const MARKET_MAP = {
    ".TW":["市","tw"], ".TWO":["櫃","tw"],
    ".SS":["滬","cn"], ".SZ":["深","cn"],
    ".HK":["港","hk"], ".T":["日","jp"], ".DE":["德","eu"],
    ".ST":["瑞","eu"], ".MC":["西","eu"], ".PA":["法","eu"], ".AS":["荷","eu"], ".L":["英","eu"],
  };
  sym = sym||"";
  const dot = sym.lastIndexOf(".");
  if(dot>=0){
    const suf = sym.slice(dot);
    if(MARKET_MAP[suf]) return {mkt:MARKET_MAP[suf][0], cls:MARKET_MAP[suf][1]};
    return {mkt:"", cls:""};
  }
  return {mkt:"美", cls:"us"};
}
function memberCard(m){
  const sym = m.sym||"";
  // ⚠ 此後綴清單須與 marketOf 的 MARKET_MAP 同步（加新市場兩處都要改）。
  const code = sym.replace(/\.(TW|TWO|SS|SZ|HK|T|DE|ST|MC|PA|AS|L)$/,"");
  const mk = marketOf(sym);
  const tags = (m.tags||[]).map(t=>'<span class="mstock-tag">'+esc(t)+'</span>').join("");
  const quote = '<div class="mstock-quote">'+
    quoteCol("1日", m.r1)+
    quoteCol("5日", m.r5)+
    quoteCol("20日", m.r20)+
  '</div>';
  const flow = (m.flow && FLOW_LABEL[m.flow])
    ? '<div class="mstock-flow '+esc(m.flow)+'">'+FLOW_LABEL[m.flow]+'</div>' : '';
  return '<div class="mstock">'+
    '<div class="mstock-top">'+
      '<span class="mstock-sym clickable" data-stk="'+esc(sym)+'">'+esc(code)+'</span>'+
      '<span class="mstock-name">'+esc(m.name)+'</span>'+
      (mk.mkt?'<span class="mstock-mkt '+mk.cls+'">'+mk.mkt+'</span>':'')+
    '</div>'+
    (tags?'<div class="mstock-tags">'+tags+'</div>':'')+
    quote+
    flow+
    (m.note?'<div class="mstock-note">'+esc(m.note)+'</div>':'')+
  '</div>';
}

let REDDIT_DATA=null, REDDIT_SORT={k:"rank",asc:true}, REDDIT_Q="", REDDIT_PAGE=1, _redditTimer=null;
const REDDIT_PER=50;
function _redditDecode(s){ return (s==null?"":String(s)).replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&#39;/g,"'").replace(/&quot;/g,'"'); }
function _redditArrow(r,r0){ if(!r0) return '<span class="dim">🆕</span>'; const d=r0-r; if(d>0) return '<span class="pos">▲'+d+'</span>'; if(d<0) return '<span class="neg">▼'+(-d)+'</span>'; return '<span class="dim">—</span>'; }

async function loadReddit(){

    if(!res.ok) throw new Error(res.status);

  }catch(e){

function renderReddit(){
  const d=REDDIT_DATA||[], q=REDDIT_Q.toLowerCase();
  let rows=q?d.filter(r=>(r.ticker||"").toLowerCase().includes(q)||(r.name||"").toLowerCase().includes(q)):d.slice();
  const sk=REDDIT_SORT.k, asc=REDDIT_SORT.asc;
  rows.sort((a,b)=>{
    if(sk==="chg"){ const av=(a.mentions-a.mentions_24h_ago), bv=(b.mentions-b.mentions_24h_ago); return asc?av-bv:bv-av; }
    if(sk==="ticker"||sk==="name"){ return asc?String(a[sk]).localeCompare(b[sk]):String(b[sk]).localeCompare(a[sk]); }
    return asc?(a[sk]-b[sk]):(b[sk]-a[sk]);
  });
  const total=rows.length, pages=Math.max(1,Math.ceil(total/REDDIT_PER));
  if(REDDIT_PAGE>pages) REDDIT_PAGE=pages;
  const slice=rows.slice((REDDIT_PAGE-1)*REDDIT_PER, REDDIT_PAGE*REDDIT_PER);
  const body=slice.map(r=>{
    const chg=(r.mentions||0)-(r.mentions_24h_ago||0);
    return '<tr><td>'+r.rank+' '+_redditArrow(r.rank,r.rank_24h_ago)+'</td>'+
      '<td style="text-align:left;font-weight:700">'+esc(r.ticker)+'</td>'+
      '<td style="text-align:left" class="dim">'+esc(_redditDecode(r.name))+'</td>'+
      '<td>'+fmtNum(r.mentions)+'</td>'+
      '<td class="'+cls(chg)+'">'+sgn(chg,0)+'</td>'+
      '<td class="dim">'+fmtNum(r.upvotes)+'</td></tr>';
  }).join("");
  $("#content").innerHTML=
    '<section><div class="sec-head"><h2>Reddit 熱門</h2></div>'+
    '<div class="legend">過去 24 小時 Reddit 提及最多的美股 · 每 5 分鐘自動更新 · 共 '+fmtNum(total)+' 檔 · 資料來源 <a href="https://meiguhuli.com/" target="_blank" rel="noopener">美股狐狸</a>。「24h變化」為提及數較 24 小時前增減,排名旁箭頭為名次變動。點欄位標題可排序。</div>'+
    '<div style="margin:8px 0"><input id="redditQ" placeholder="搜尋代碼或名稱…" value="'+esc(REDDIT_Q)+'" style="width:100%;max-width:280px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink)"></div>'+
    '<div class="tbl-wrap"><table><thead><tr>'+
    _rth("rank","排名")+_rth("ticker","代碼",1)+_rth("name","名稱",1)+_rth("mentions","提及")+_rth("chg","24h變化")+_rth("upvotes","點讚")+
    '</tr></thead><tbody>'+body+'</tbody></table></div>'+
    '<div style="display:flex;gap:8px;justify-content:center;align-items:center;margin-top:12px">'+
    '<button class="btn" id="rdPrev"'+(REDDIT_PAGE<=1?" disabled":"")+'>上一頁</button>'+
    '<span class="dim">第 '+REDDIT_PAGE+' / '+pages+' 頁</span>'+
    '<button class="btn" id="rdNext"'+(REDDIT_PAGE>=pages?" disabled":"")+'>下一頁</button></div></section>';
  const qi=$("#redditQ"); if(qi){ qi.oninput=e=>{ REDDIT_Q=e.target.value.trim(); REDDIT_PAGE=1; renderReddit(); const n=$("#redditQ"); if(n){ n.focus(); n.setSelectionRange(n.value.length,n.value.length); } }; }
  const pv=$("#rdPrev"); if(pv) pv.onclick=()=>{ if(REDDIT_PAGE>1){ REDDIT_PAGE--; renderReddit(); } };
  const nx=$("#rdNext"); if(nx) nx.onclick=()=>{ REDDIT_PAGE++; renderReddit(); };
  document.querySelectorAll("#content th[data-rk]").forEach(th=>th.onclick=()=>{ const k=th.dataset.rk; if(REDDIT_SORT.k===k) REDDIT_SORT.asc=!REDDIT_SORT.asc; else { REDDIT_SORT.k=k; REDDIT_SORT.asc=(k==="rank"); } renderReddit(); });
}

function renderSmart(){
  const d=(SMART_DATA&&SMART_DATA.stocks)||[], q=SMART_Q.toLowerCase();
  let rows=q?d.filter(r=>(r.ticker||"").toLowerCase().includes(q)||(r.name||"").toLowerCase().includes(q)):d.slice();
  const sk=SMART_SORT.k, asc=SMART_SORT.asc;
  rows.sort((a,b)=>{
    if(sk==="ticker"||sk==="name"){ return asc?String(a[sk]).localeCompare(b[sk]):String(b[sk]).localeCompare(a[sk]); }
    let av=0, bv=0;
    if(sk==="hits"){ av=Number(a.hits)||0; bv=Number(b.hits)||0; }
    else if(sk==="insider"){ av=(a.signals&&a.signals.insider)?a.signals.insider.net_usd||0:0; bv=(b.signals&&b.signals.insider)?b.signals.insider.net_usd||0:0; }
    else if(sk==="congress"){ av=(a.signals&&a.signals.congress)?((a.signals.congress.buys||0)-(a.signals.congress.sells||0)):0; bv=(b.signals&&b.signals.congress)?((b.signals.congress.buys||0)-(b.signals.congress.sells||0)):0; }
    else if(sk==="filing"){ av=(a.signals&&a.signals.filing13dg)?a.signals.filing13dg.count||0:0; bv=(b.signals&&b.signals.filing13dg)?b.signals.filing13dg.count||0:0; }
    else if(sk==="darkpool"){ av=(a.signals&&a.signals.darkpool)?a.signals.darkpool.shares||0:0; bv=(b.signals&&b.signals.darkpool)?b.signals.darkpool.shares||0:0; }
    return asc?av-bv:bv-av;
  });
  const total=rows.length, pages=Math.max(1,Math.ceil(total/SMART_PER));
  if(SMART_PAGE>pages) SMART_PAGE=pages;
  const slice=rows.slice((SMART_PAGE-1)*SMART_PER, SMART_PAGE*SMART_PER);
  const upd=SMART_DATA&&SMART_DATA.updated?SMART_DATA.updated.replace("T"," ").slice(0,16)+" UTC":"—";
  const body=slice.map(r=>{
    const f=_smFmt(r.signals);
    return '<tr class="smart-row" style="cursor:pointer" data-t="'+esc(r.ticker)+'">'+
      '<td style="text-align:left;font-weight:700">'+esc(r.ticker)+'</td>'+
      '<td style="text-align:left" class="dim">'+esc(r.name||"—")+'</td>'+
      '<td>'+fmtNum(r.hits)+'</td>'+
      '<td>'+f.insider+'</td>'+
      '<td>'+f.congress+'</td>'+
      '<td>'+f.filing+'</td>'+
      '<td>'+f.darkpool+'</td>'+
      '</tr>';
  }).join("");
  $("#content").innerHTML=
    '<section><div class="sec-head"><h2>聰明錢榜</h2></div>'+
    '<div class="legend">聚合內部人買賣、國會交易、13D/G大戶申報、暗池成交，共 '+fmtNum(total)+' 檔。更新：'+esc(upd)+'。點列可查詳情(開發中)。</div>'+
    '<div style="margin:8px 0"><input id="smartQ" placeholder="搜尋代碼或名稱…" value="'+esc(SMART_Q)+'" style="width:100%;max-width:280px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink)"></div>'+
    '<div class="tbl-wrap"><table><thead><tr>'+
    _smth("ticker","代碼",1)+_smth("name","名稱",1)+_smth("hits","訊號數")+_smth("insider","內部人")+_smth("congress","國會")+_smth("filing","13D/G")+_smth("darkpool","暗池")+
    '</tr></thead><tbody>'+body+'</tbody></table></div>'+
    '<div style="display:flex;gap:8px;justify-content:center;align-items:center;margin-top:12px">'+
    '<button class="btn" id="smPrev"'+(SMART_PAGE<=1?" disabled":"")+'>上一頁</button>'+
    '<span class="dim">第 '+SMART_PAGE+' / '+pages+' 頁</span>'+
    '<button class="btn" id="smNext"'+(SMART_PAGE>=pages?" disabled":"")+'>下一頁</button></div></section>';
  const qi=$("#smartQ"); if(qi){ qi.oninput=e=>{ SMART_Q=e.target.value.trim(); SMART_PAGE=1; renderSmart(); const n=$("#smartQ"); if(n){ n.focus(); n.setSelectionRange(n.value.length,n.value.length); } }; }
  const pv=$("#smPrev"); if(pv) pv.onclick=()=>{ if(SMART_PAGE>1){ SMART_PAGE--; renderSmart(); } };
  const nx=$("#smNext"); if(nx) nx.onclick=()=>{ SMART_PAGE++; renderSmart(); };
  document.querySelectorAll("#content th[data-sk]").forEach(th=>th.onclick=()=>{ const k=th.dataset.sk; if(SMART_SORT.k===k) SMART_SORT.asc=!SMART_SORT.asc; else { SMART_SORT.k=k; SMART_SORT.asc=(k==="ticker"||k==="name"); } renderSmart(); });
  document.querySelectorAll("#content tr.smart-row").forEach(tr=>tr.onclick=()=>renderSmartDetail(tr.dataset.t));
}

const ETF_ACTION_CLS={"新增":"etf-new","加碼":"pos","減碼":"neg","出清":"dim"};
const ETF_ACTION_ICON={"新增":"🆕新增","加碼":"➕加碼","減碼":"➖減碼","出清":"❌出清"};

// 目前持股(snapshot)表:還沒有逐日異動時顯示,避免分頁空白。依權重高→低。
function etfSnapshotTables(d, fE){
  const order=(d.order||[]).filter(e=>fE==="all"||e===fE);
  const snap=d.snapshot||{};
  let h="";
  for(const etf of order){
    const rows=(snap[etf]||[]).slice().sort((a,b)=>(parseFloat(b.weight)||0)-(parseFloat(a.weight)||0));
    if(!rows.length) continue;
    h+='<div class="tg-gname" style="margin:12px 0 6px">▎'+esc(etf)+' '+esc((d.etfs[etf]||{}).name||etf)+
       '　<span class="dim" style="font-weight:400">目前 '+rows.length+' 檔</span></div>'+
       '<div class="tbl-wrap"><table><thead><tr><th style="text-align:left">代碼/名稱</th><th>權重%</th><th>張數</th></tr></thead><tbody>'+
       rows.map(r=>'<tr'+(r.code?' data-sym="'+esc(r.code)+'"':'')+'>'+symCell(r.code,r.name)+
         '<td>'+esc(r.weight)+'%</td><td class="dim">'+fmtNum(parseFloat(r.qty)||0)+'</td></tr>').join("")+
       '</tbody></table></div>';
  }
  return h||'<div class="note">目前無持股快照資料。</div>';
}
// 📌 近 7 天「新增/出清」紀錄:從逐日 history 聚合最高訊號事件(忽略加/減碼),依 ETF 分組。
// 只受 ETF 篩選影響(動作篩選不套用,這是專屬摘要)。即使某檔幾天前新增後沒再變,仍會留在 7 天內。
function etfRecentAddDrop(d, fE){
  if(!d.history || !d.history.length) return "";
  const latest=d.history[0].date;
  const cut=new Date(latest+"T00:00:00Z"); cut.setUTCDate(cut.getUTCDate()-6);  // 含當日共 7 天
  const cutStr=cut.toISOString().slice(0,10);
  const byEtf={};
  for(const day of d.history){           // history 為新到舊
    if(day.date<cutStr) break;
    for(const c of day.changes){
      if(c.action!=="新增"&&c.action!=="出清") continue;
      if(fE!=="all"&&c.etf!==fE) continue;
      (byEtf[c.etf]=byEtf[c.etf]||[]).push(Object.assign({date:day.date}, c));
    }
  }
  const order=(d.order||[]).filter(e=>fE==="all"||e===fE);
  let h="";
  for(const etf of order){
    const recs=byEtf[etf]; if(!recs||!recs.length) continue;
    const nNew=recs.filter(r=>r.action==="新增").length, nOut=recs.filter(r=>r.action==="出清").length;
    h+='<div class="tg-gname" style="margin:10px 0 6px">▎'+esc(etf)+' '+esc((d.etfs[etf]||{}).name||etf)+
       '　<span class="dim" style="font-weight:400">🆕新增 '+nNew+' ・ ❌出清 '+nOut+'</span></div>'+
       '<div class="tbl-wrap"><table><thead><tr><th>日期</th><th>動作</th><th style="text-align:left">代碼/名稱</th><th>權重%</th><th>張數</th></tr></thead><tbody>'+
       recs.map(r=>'<tr'+(r.code?' data-sym="'+esc(r.code)+'"':'')+'>'+
         '<td class="dim">'+esc(r.date)+'</td>'+
         '<td class="'+(ETF_ACTION_CLS[r.action]||"dim")+'" style="font-weight:700">'+(ETF_ACTION_ICON[r.action]||esc(r.action))+'</td>'+
         symCell(r.code,r.name)+
         '<td>'+(r.action==="出清"?'<span class="dim">'+fmtNum(Math.abs(r.dweight),2)+'→0</span>':fmtNum(r.weight,2))+'</td>'+
         '<td class="dim">'+fmtNum(Math.abs(r.dqty))+'</td></tr>').join("")+
       '</tbody></table></div>';
  }
  if(!h) h='<div class="note">近 7 天無 新增/出清 紀錄（僅加減碼或無變動）。</div>';
  return '<details class="etf-7d" open style="margin:6px 0 4px"><summary class="tg-gname" style="cursor:pointer;font-size:14px">📌 近 7 天 新增・出清紀錄'+
         (fE==="all"?'（全部 ETF）':'（'+esc(fE)+'）')+'　<span class="dim" style="font-weight:400">資料保存 30 天,此處顯示最近 7 天</span></summary>'+
         '<div style="margin-top:8px">'+h+'</div></details>';
}

function renderEtf(){
  const d=ETF_DATA;
  if(!d || !d.history){ $("#content").innerHTML='<section><div class="sec-head"><h2>ETF 持股異動</h2></div><div class="note">ETF 資料尚未產生，請待下次更新。</div></section>'; return; }
  const latest=d.history.length?d.history[0].date:"—";
  const fE=ETF_FILTER.etf, fA=ETF_FILTER.action;
  const days=d.history.map(day=>{
    const cs=day.changes.filter(c=>(fE==="all"||c.etf===fE)&&(fA==="all"||c.action===fA));
    return {date:day.date, changes:cs};
  }).filter(day=>day.changes.length);

  let html='<section>'+
    '<div class="sec-head"><h2>ETF 持股異動</h2><span class="tag">5 檔主動式ETF · 每日追蹤</span>'+
      '<span class="hint">資料日 '+esc(latest)+'</span></div>'+
    '<div class="banner show" style="display:block;background:#fff8e6;border-color:#f0d488;color:#8a6400;margin:0 0 12px">'+
      '⚠️ 資料來源各 ETF 發行商官網（統一/群益/元大）。週末/假日持股不變動屬正常，故當日不列。'+
    '</div>'+ etfFilterBar(d) + etfRecentAddDrop(d, fE);

  if(!days.length){
    html+='<div class="note">'+(d.history.length?'目前篩選條件下無變動紀錄。':'尚無逐日異動紀錄（異動需累積≥2天比對,剛啟用時先顯示目前持股）。')+'</div>';
    html+=etfSnapshotTables(d, fE);   // 還沒有異動 → 顯示最新成分(目前持股)
  }else{
    for(const day of days){
      html+='<div class="tg-gname" style="margin-top:16px;font-size:14px">📅 '+esc(day.date)+(day===days[0]?'（最新）':'')+'</div>';
      for(const etf of d.order){
        const grp=day.changes.filter(c=>c.etf===etf);
        if(!grp.length) continue;
        const cnt=a=>grp.filter(c=>c.action===a).length;
        const tags=["新增","加碼","減碼","出清"].filter(a=>cnt(a)).map(a=>[...ETF_ACTION_ICON[a]].slice(1).join("")+cnt(a)).join(" ");
        html+='<div class="tg-gname" style="margin:10px 0 6px">▎'+esc(etf)+' '+esc((d.etfs[etf]||{}).name||etf)+'　<span class="dim" style="font-weight:400">'+tags+'</span></div>'+
              etfChangeTable(grp);
      }
    }
  }
  html+='<div class="legend">🆕新增＝昨無今有；➕加碼/➖減碼＝張數增/減；❌出清＝昨有今無。每日依 ETF 分組，組內按權重高→低。代碼可點進個股。</div></section>';
  $("#content").innerHTML=html;

  $("#content").querySelectorAll(".etf-fb").forEach(b=>b.onclick=()=>{
    if(b.dataset.etf!=null) ETF_FILTER.etf=b.dataset.etf;
    if(b.dataset.act!=null) ETF_FILTER.action=b.dataset.act;
    renderEtf();
  });
}

// 由中文名查代號。回傳 {exact:sym|null, matches:[{sym,name}]}。
// exact＝完整名稱命中；matches＝名稱含查詢字串者（精確優先排前）。
function lookupByName(ni, qRaw){
  const q = (qRaw||"").trim();
  if(!q || !ni) return {exact:null, matches:[]};
  const exact = ni.byName[q] || null;
  const matches = ni.names.filter(x=>x.name.includes(q));
  matches.sort((a,b)=>(a.name===q?-1:0)-(b.name===q?-1:0) || a.name.length-b.name.length);
  return {exact, matches};
}

// ── ChartArt MA 交叉指標:EMA/SMA/WMA、可選週期、趨勢變色、Buy/Sell 箭頭、交叉背景 ──
let MACROSS_ON=true, MACROSS_TYPE="ema", MACROSS_SHORT=20, MACROSS_LONG=60;
function _maCalc(cl, n, type){
  const out=new Array(cl.length).fill(null);
  if(type==="ema"){
    const k=2/(n+1); let ema=null;
    for(let i=0;i<cl.length;i++){
      if(i<n-1){ continue; }
      if(i===n-1){ let s=0,ok=1; for(let j=0;j<n;j++){ if(cl[i-j]==null){ok=0;break;} s+=cl[i-j]; } ema=ok?s/n:null; out[i]=ema; continue; }
      if(cl[i]==null||ema==null){ out[i]=ema; continue; }
      ema=cl[i]*k+ema*(1-k); out[i]=ema;
    }
  }else if(type==="wma"){
    for(let i=n-1;i<cl.length;i++){ let s=0,w=0,ok=1; for(let j=0;j<n;j++){ if(cl[i-j]==null){ok=0;break;} const ww=n-j; s+=cl[i-j]*ww; w+=ww; } out[i]=ok?s/w:null; }
  }else{ // sma
    for(let i=n-1;i<cl.length;i++){ let s=0,ok=1; for(let j=0;j<n;j++){ if(cl[i-j]==null){ok=0;break;} s+=cl[i-j]; } out[i]=ok?s/n:null; }
  }
  return out;
}
// ── 成本分布(籌碼):由歷史量價+時間衰減估算各價位持有量 ──
let CHIP_LB=120;
function _chipCompute(candles, lookback){
  const cdl=candles.filter(c=>c.o!=null&&c.v!=null&&c.h!=null&&c.l!=null).slice(-lookback);
  if(cdl.length<5) return null;
  let pmin=Infinity,pmax=-Infinity;
  cdl.forEach(c=>{ pmin=Math.min(pmin,c.l); pmax=Math.max(pmax,c.h); });
  const bins=40, span=(pmax-pmin)||1, bw=span/bins;
  const chips=new Array(bins).fill(0), n=cdl.length;
  const halflife=Math.max(20,lookback/3), lambda=Math.LN2/halflife;
  cdl.forEach((c,i)=>{
    const w=Math.exp(-lambda*(n-1-i))*c.v;       // 時間衰減後的量(近期權重高)
    const lo=c.l, hi=c.h, mid=(c.h+c.l+c.c+c.c)/4;
    const b0=Math.max(0,Math.floor((lo-pmin)/bw)), b1=Math.min(bins-1,Math.floor((hi-pmin)/bw));
    let tw=[], sum=0;
    const half=Math.max((hi-lo)/2,bw);
    for(let b=b0;b<=b1;b++){ const center=pmin+(b+0.5)*bw; const t=Math.max(0,1-Math.abs(center-mid)/half); tw.push(t); sum+=t; }
    if(sum<=0){ for(let b=b0;b<=b1;b++) chips[b]+=w/(b1-b0+1); }
    else{ for(let b=b0;b<=b1;b++) chips[b]+=w*tw[b-b0]/sum; }
  });
  const prices=chips.map((_,b)=>pmin+(b+0.5)*bw);
  const total=chips.reduce((a,b)=>a+b,0)||1;
  return {chips,prices,total};
}
// 客戶端 EMA20×EMA60 黃金交叉進/死亡交叉出 完整波段回測(與技術圖 Buy/Sell 同口徑;pre-gen 與即時生成股一致)
function _emaBacktest(candles){
  const cl=(candles||[]).filter(c=>c.c!=null).map(c=>c.c), n=cl.length;
  if(n<85) return null;
  const se=_maCalc(cl,20,"ema"), le=_maCalc(cl,60,"ema");
  const crosses=[];
  for(let i=1;i<n;i++){ const ps=se[i-1],pl=le[i-1],cs=se[i],ll=le[i]; if(ps==null||pl==null||cs==null||ll==null) continue;
    if((ps-pl)<=0&&(cs-ll)>0) crosses.push([i,"g"]); else if((ps-pl)>=0&&(cs-ll)<0) crosses.push([i,"d"]); }
  const rets=[],hold=[]; let inPos=false,entryI=null,open_trade=null;
  for(const cr of crosses){ const idx=cr[0],typ=cr[1];
    if(typ==="g"&&!inPos){ entryI=idx+1; if(entryI<n) inPos=true; }
    else if(typ==="d"&&inPos){ const x=idx+1; if(x<n){ const e=cl[entryI],xc=cl[x]; if(e&&xc){ rets.push((xc/e-1)*100); hold.push(x-entryI); } } inPos=false; entryI=null; } }
  if(inPos&&entryI!=null&&entryI<n){ const e=cl[entryI],last=cl[n-1]; if(e&&last) open_trade={entry_ret:(last/e-1)*100, days:(n-1)-entryI}; }
  if(rets.length<3) return null;
  const rs=rets.slice().sort((a,b)=>a-b);
  const wins=rets.filter(r=>r>0), losses=rets.filter(r=>r<=0);
  const sum=a=>a.reduce((x,y)=>x+y,0);
  const avg_win=wins.length?sum(wins)/wins.length:null, avg_loss=losses.length?sum(losses)/losses.length:null;
  const stat={n:rets.length, win_rate:wins.length/rets.length*100, avg:sum(rets)/rets.length,
    median:rs[Math.floor(rs.length/2)], avg_win, avg_loss,
    pl_ratio:(avg_win!=null&&avg_loss)?Math.abs(avg_win/avg_loss):null,
    best:Math.max.apply(null,rets), worst:Math.min.apply(null,rets), avg_hold:sum(hold)/hold.length};
  return {signal:"EMA20×EMA60", years:Math.max(1,Math.round(n/252)), open_trade, stat};
}

}

// 客戶端 EMA20×EMA60 交叉序列(與技術圖 Buy/Sell 同口徑;近2年)
function _emaSignals(candles){
  const cdl=(candles||[]).filter(c=>c.c!=null), cl=cdl.map(c=>c.c);
  if(cl.length<62) return [];
  const s=_maCalc(cl,20,"ema"), l=_maCalc(cl,60,"ema"), out=[];
  const cut=cdl.length>504?cdl.length-504:0;   // 約近2年
  for(let i=1;i<cdl.length;i++){ const ps=s[i-1],pl=l[i-1],cs=s[i],ll=l[i]; if(ps==null||pl==null||cs==null||ll==null) continue;
    if(i<cut) continue;
    if(ps<=pl&&cs>ll) out.push({t:cdl[i].t,price:cdl[i].c,type:"golden"});
    else if(ps>=pl&&cs<ll) out.push({t:cdl[i].t,price:cdl[i].c,type:"death"}); }
  return out;
}

let _chartObj=null;
function drawChart(d){
  const el=document.getElementById("chart");
  if(!el || !window.echarts){ if(el) el.innerHTML='<div class="loading-screen">圖表庫載入失敗</div>'; return; }
  if(_chartObj){ try{_chartObj.dispose();}catch(e){} }
  const chart=echarts.init(el,null,{renderer:"canvas"});
  _chartObj=chart;

  const cdl=d.candles.filter(c=>c.o!=null);
  const dates=cdl.map(c=>c.t);
  const r2=v=>v==null?null:+Number(v).toFixed(2);
  // K棒資料 ECharts 格式：[open, close, low, high]，全部四捨五入到 2 位
  const kdata=cdl.map(c=>[r2(c.o),r2(c.c),r2(c.l),r2(c.h)]);
  // 各日相對前一日收盤的漲跌%(給 tooltip 用)
  const chgArr=cdl.map((c,i)=> i>0 && cdl[i-1].c ? +((c.c/cdl[i-1].c-1)*100).toFixed(2) : null);

  // 籌碼分布(成本分布)疊在 K 線右側:Volume Profile
  const _mp=d.metrics||{}, _lastC=cdl.length?cdl[cdl.length-1].c:null;
  const curPrice=(_mp.price!=null?_mp.price:_lastC);
  const prof=_chipCompute(d.candles, CHIP_LB);
  let profSeries=null;
  if(prof){
    const maxC=Math.max.apply(null,prof.chips)||1;
    const halfBin=(prof.prices.length>1?(prof.prices[1]-prof.prices[0])/2:0);
    // 掛在獨立數值 X 軸(index 1,不受 dataZoom 縮放)→ 籌碼柱永遠貼右緣、不被 cull
    const pdata=prof.prices.map((p,i)=>[0.5,p,prof.chips[i]/maxC,(curPrice!=null&&p>curPrice)?1:0]);
    profSeries={type:"custom",z:1,silent:true,clip:true,xAxisIndex:1,yAxisIndex:0,data:pdata,
      renderItem:(params,api)=>{
        const p=api.value(1), wn=api.value(2), above=api.value(3), cs=params.coordSys;
        const yC=api.coord([0.5,p])[1], yT=api.coord([0.5,p+halfBin])[1];
        const h=Math.max(1.5,Math.abs(yC-yT)*2*0.82);
        const w=cs.width*0.26*wn;
        return {type:"rect",shape:{x:cs.x+cs.width-w,y:yC-h/2,width:w,height:h},
          style:{fill:above?"rgba(225,29,72,.28)":"rgba(22,163,74,.28)"}};
      }};
    // 摘要
    let above=0,below=0,wsum=0;
    prof.chips.forEach((v,i)=>{ wsum+=v*prof.prices[i]; if(curPrice!=null){ if(prof.prices[i]>curPrice) above+=v; else below+=v; } });
    const avg=wsum/prof.total, mi=prof.chips.indexOf(maxC);
    setTimeout(()=>{ const se=document.getElementById("chipSummary"); if(se) se.innerHTML=
      '平均成本 <b>'+avg.toFixed(2)+'</b> · 最密集 <b>'+prof.prices[mi].toFixed(2)+'</b>'+
      (curPrice!=null?' · 上方套牢 <b class="neg">'+(above/prof.total*100).toFixed(1)+'%</b> · 下方獲利 <b class="pos">'+(below/prof.total*100).toFixed(1)+'%</b>':''); },0);
  }

  // 均線:預設用預生 MA;開 ChartArt MA交叉指標時改用 EMA/SMA/WMA(可選週期)並依趨勢變色
  const closesArr=cdl.map(c=>c.c);
  let sn, ln, sLine, lLine, shrtDir=null, lngDir=null, markPts, bgArea=[], maNames;
  if(MACROSS_ON){
    sn=MACROSS_SHORT; ln=MACROSS_LONG;
    sLine=_maCalc(closesArr,sn,MACROSS_TYPE).map(v=>v==null?null:+v.toFixed(2));
    lLine=_maCalc(closesArr,ln,MACROSS_TYPE).map(v=>v==null?null:+v.toFixed(2));
    const dirOf=a=>a.map((v,i)=>(v==null||a[i-1]==null)?0:(v>a[i-1]?1:(v<a[i-1]?-1:0)));
    shrtDir=dirOf(sLine); lngDir=dirOf(lLine);
    const buys=[],sells=[];
    for(let i=1;i<cdl.length;i++){ const ps=sLine[i-1],pl=lLine[i-1],cs=sLine[i],cl=lLine[i];
      if(ps==null||pl==null||cs==null||cl==null) continue;
      if(ps<=pl&&cs>cl) buys.push(i);          // 黃金交叉=Buy(不再用收盤確認過濾,避免漏進場點)
      else if(ps>=pl&&cs<cl) sells.push(i);    // 死亡交叉=Sell
    }
    markPts=[].concat(
      buys.map(i=>({coord:[dates[i],cdl[i].l],symbol:"arrow",symbolSize:11,itemStyle:{color:"#16a34a"},
        label:{show:true,position:"bottom",fontSize:10,color:"#16a34a",formatter:"Buy"}})),
      sells.map(i=>({coord:[dates[i],cdl[i].h],symbol:"arrow",symbolRotate:180,symbolSize:11,itemStyle:{color:"#e11d48"},
        label:{show:true,position:"top",fontSize:10,color:"#e11d48",formatter:"Sell"}})));
    bgArea=[].concat(
      buys.map(i=>[{xAxis:dates[i],itemStyle:{color:"rgba(22,163,74,.12)"}},{xAxis:dates[Math.min(dates.length-1,i+1)]}]),
      sells.map(i=>[{xAxis:dates[i],itemStyle:{color:"rgba(225,29,72,.12)"}},{xAxis:dates[Math.min(dates.length-1,i+1)]}]));
    maNames=[MACROSS_TYPE.toUpperCase()+sn, MACROSS_TYPE.toUpperCase()+ln];
  }else{
    const ma=d.ma||{};
    const shortArr=ma.ma_short||ma.ma20||[], longArr=ma.ma_long||ma.ma60||[];
    sn=ma.short_n||10; ln=ma.long_n||50;
    const sMap={}, lMap={};
    shortArr.forEach(p=>{if(p.v!=null)sMap[p.t]=p.v;});
    longArr.forEach(p=>{if(p.v!=null)lMap[p.t]=p.v;});
    sLine=dates.map(t=>sMap[t]!=null?+sMap[t].toFixed(2):null);
    lLine=dates.map(t=>lMap[t]!=null?+lMap[t].toFixed(2):null);
    markPts=(d.signals||[]).map(s=>{ const golden=s.type==="golden";
      return {coord:[s.t,s.price],symbol:golden?"triangle":"pin",symbolSize:golden?14:16,symbolRotate:golden?0:180,
        itemStyle:{color:golden?"#16a34a":"#e11d48"},
        label:{show:true,position:golden?"bottom":"top",fontSize:10,color:golden?"#16a34a":"#e11d48",formatter:golden?"金叉":"死叉"}}; });
    maNames=["MA"+sn,"MA"+ln];
  }

  // 灰色填色帶
  const bandLow=dates.map((t,i)=>(sLine[i]!=null&&lLine[i]!=null)?Math.min(sLine[i],lLine[i]):null);
  const bandGap=dates.map((t,i)=>(sLine[i]!=null&&lLine[i]!=null)?+Math.abs(sLine[i]-lLine[i]).toFixed(2):null);

  chart.setOption({
    animation:false,
    grid:{left:8,right:56,top:14,bottom:48,containLabel:true},
    tooltip:{trigger:"axis",axisPointer:{type:"cross"},
      backgroundColor:"#fff",borderColor:"#e3e8f0",textStyle:{color:"#1a2433",fontSize:11},
      formatter:function(ps){
        if(!ps||!ps.length) return "";
        const i=ps[0].dataIndex, k=kdata[i], chg=chgArr[i];
        if(!k) return ps[0].axisValue;
        const fx=n=>n==null?"–":Number(n).toFixed(2);
        const chgTxt = chg==null?"" :
          '<span style="color:'+(chg>0?"#16a34a":(chg<0?"#e11d48":"#9aa6b6"))+'">'+
          (chg>0?"+":"")+chg.toFixed(2)+'%</span>';
        let html='<b>'+ps[0].axisValue+'</b>　今日 '+chgTxt+'<br>'+
          '開 '+fx(k[0])+'　收 '+fx(k[1])+'<br>高 '+fx(k[3])+'　低 '+fx(k[2]);
        // 均線值
        ps.forEach(p=>{
          if(p.seriesName&&(p.seriesName===maNames[0]||p.seriesName===maNames[1])){
            const val=Array.isArray(p.value)?p.value[1]:p.value;
            if(val!=null) html+='<br><span style="color:'+p.color+'">'+p.seriesName+'</span> '+fx(val);
          }
        });
        return html;
      }},
    legend:{data:["K線",maNames[0],maNames[1]],top:0,right:8,itemWidth:14,itemHeight:8,
      textStyle:{fontSize:11,color:"#5a6678"}},
    visualMap:(MACROSS_ON&&shrtDir)?[
      {show:false,seriesIndex:3,type:"piecewise",dimension:2,pieces:[{value:1,color:"#16a34a"},{value:-1,color:"#e11d48"},{value:0,color:"#2563eb"}]},
      {show:false,seriesIndex:4,type:"piecewise",dimension:2,pieces:[{value:1,color:"#16a34a"},{value:-1,color:"#e11d48"},{value:0,color:"#2563eb"}]}
    ]:undefined,
    xAxis:[{type:"category",data:dates,boundaryGap:true,
      axisLine:{lineStyle:{color:"#e3e8f0"}},axisLabel:{color:"#9aa6b6",fontSize:10,
        formatter:v=>v.slice(5)}, splitLine:{show:false}},
      {type:"value",min:0,max:1,show:false}],   // index 1:籌碼柱專用,不受縮放
    yAxis:{scale:true,position:"right",axisLine:{show:false},
      axisLabel:{color:"#9aa6b6",fontSize:10},
      splitLine:{lineStyle:{color:"#eef1f6"}}},
    dataZoom:[{type:"inside",start:80,end:100,xAxisIndex:[0]},{type:"slider",height:16,bottom:18,xAxisIndex:[0],
      borderColor:"#e3e8f0",fillerColor:"rgba(37,99,235,.08)",
      handleStyle:{color:"#2563eb"},textStyle:{color:"#9aa6b6",fontSize:9}}],
    series:[
      // 填色帶(銀灰)：先放透明底，再疊灰色差值
      {name:"band-low",type:"line",data:bandLow,stack:"band",lineStyle:{opacity:0},
        areaStyle:{opacity:0},symbol:"none",silent:true,z:1,tooltip:{show:false},legendHoverLink:false},
      {name:"band",type:"line",data:bandGap,stack:"band",lineStyle:{opacity:0},
        areaStyle:{color:"rgba(148,163,184,.28)"},symbol:"none",silent:true,z:1,tooltip:{show:false},legendHoverLink:false},
      // K線
      {name:"K線",type:"candlestick",data:kdata,z:3,
        itemStyle:{color:"#16a34a",color0:"#e11d48",borderColor:"#16a34a",borderColor0:"#e11d48"},
        markPoint:{data:markPts,silent:true},
        markArea:bgArea.length?{silent:true,data:bgArea}:undefined},
      // 雙均線(指標開啟時帶 dir 維度供 visualMap 變色)
      {name:maNames[0],type:"line",data:(MACROSS_ON&&shrtDir)?dates.map((t,i)=>[i,sLine[i],shrtDir[i]]):sLine,
        smooth:true,symbol:"none",z:4,lineStyle:{color:"#f59e0b",width:1.8},connectNulls:true},
      {name:maNames[1],type:"line",data:(MACROSS_ON&&lngDir)?dates.map((t,i)=>[i,lLine[i],lngDir[i]]):lLine,
        smooth:true,symbol:"none",z:4,lineStyle:{color:"#2563eb",width:2.6},connectNulls:true},
    ].concat(profSeries?[profSeries]:[]),
  });
  const ro=()=>chart.resize();
  window.addEventListener("resize",ro);
  document.querySelectorAll(".chip-lb").forEach(b=>b.onclick=()=>{ CHIP_LB=+b.dataset.n;
    document.querySelectorAll(".chip-lb").forEach(x=>x.classList.toggle("on",+x.dataset.n===CHIP_LB)); drawChart(d); });
  document.querySelectorAll(".mac-on").forEach(b=>b.onclick=()=>{ MACROSS_ON=b.dataset.v==="1"; drawChart(d); });
  document.querySelectorAll(".mac-type").forEach(b=>b.onclick=()=>{ MACROSS_TYPE=b.dataset.t; MACROSS_ON=true; drawChart(d); });
  document.querySelectorAll(".mac-n").forEach(inp=>{ inp.onclick=e=>e.stopPropagation();
    inp.onkeydown=e=>{ if(e.key==="Enter"){ e.preventDefault(); inp.blur(); } };
    inp.onchange=()=>{ const v=parseInt(inp.value,10); if(v>=2&&v<=400){ if(inp.dataset.k==="s")MACROSS_SHORT=v; else MACROSS_LONG=v; MACROSS_ON=true; drawChart(d); } }; });
}

function navOrder(){

  NAV.forEach(n=>{ if(!ordered.includes(n.view)) ordered.push(n.view); });  // 新 view 補到尾端

  try{

// 找指標 x 應插入到哪個 tab 之前(回 null = 放到最後);忽略正在拖曳的那顆。
function tabAfterPoint(x, dragBtn){
  const others=Array.from($("#mainnav").querySelectorAll(".mtab")).filter(t=>t!==dragBtn);
  for(const t of others){ const r=t.getBoundingClientRect(); if(x < r.left + r.width/2) return t; }
  return null;
}
// 點擊=切頁;拖曳(滑鼠移動>6px / 觸控長按後移動)=重排。
function bindTab(btn){
  let sx=0,sy=0,armed=false,dragging=false,moved=false,lp=null;
  const clearLP=()=>{ if(lp){clearTimeout(lp); lp=null;} };
  btn.addEventListener("pointerdown",e=>{
    if(e.pointerType==="mouse" && e.button!==0) return;
    sx=e.clientX; sy=e.clientY; moved=false; dragging=false; btn._on=true;
    armed = (e.pointerType==="mouse");                        // 滑鼠立即可拖;觸控需長按
    if(!armed){ lp=setTimeout(()=>{ armed=true; btn.classList.add("press"); },300); }
  });
  btn.addEventListener("pointermove",e=>{
    if(!btn._on) return;
    const dist=Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy);
    if(!armed){ if(dist>8){ clearLP(); btn._on=false; } return; }  // 觸控未武裝就滑=捲動意圖,交還原生
    if(!dragging && dist>6){
      dragging=true; moved=true;
      try{ btn.setPointerCapture(e.pointerId); }catch(_){}
      btn.classList.add("dragging");
    }
    if(dragging){
      e.preventDefault();
      const nav=$("#mainnav"), after=tabAfterPoint(e.clientX, btn);
      if(after==null){ if(btn.nextSibling) nav.appendChild(btn); }
      else if(after!==btn && after!==btn.nextSibling){ nav.insertBefore(btn, after); }
    }
  });
  const end=(e,canClick)=>{
    if(!btn._on) return;
    btn._on=false; clearLP(); btn.classList.remove("press");
    if(dragging){
      dragging=false; btn.classList.remove("dragging");
      try{ btn.releasePointerCapture(e.pointerId); }catch(_){}
      saveNavOrder(Array.from($("#mainnav").querySelectorAll(".mtab")).map(t=>t.dataset.view));
    } else if(canClick && !moved){
      switchView(btn.dataset.view);                          // 點擊(放開)=切頁;捲動取消(pointercancel)不切
    }
  };
  btn.addEventListener("pointerup",e=>end(e,true));
  btn.addEventListener("pointercancel",e=>end(e,false));
}

function fmtAgo(iso){
  if(!iso) return "";
  const t=Date.parse(iso); if(isNaN(t)) return "";
  const s=(Date.now()-t)/1000;
  if(s<60) return "剛剛";
  if(s<3600) return Math.floor(s/60)+" 分前";
  if(s<86400) return Math.floor(s/3600)+" 小時前";
  return Math.floor(s/86400)+" 天前";
}

function resolveSymByCode(syms, code){
  const q = (code||"").toUpperCase();
  if(!q) return null;
  if(syms.includes(q)) return q;
  if(syms.includes(q+".TW")) return q+".TW";
  if(syms.includes(q+".TWO")) return q+".TWO";
  return null;   // 不再用「開頭符合」(避免 TTE 誤跳 TTEK);無詳情者由呼叫端 showLiveQuote 顯示即時報價
}
// 在當前榜單高亮某 sym（去後綴比對）；回傳是否命中。
function highlightInList(symOrCode){
  document.querySelectorAll("tr.hit").forEach(tr=>tr.classList.remove("hit"));
  const q = (symOrCode||"").toUpperCase();
  const code = q.replace(/\.(TW|TWO)$/,"");
  const rows = Array.from(document.querySelectorAll("tr[data-sym]"));
  const hit = rows.find(tr=>{
    const s = tr.dataset.sym.toUpperCase();
    return s===q || s===code || s===code+".TW" || s===code+".TWO";
  });
  if(hit){ hit.classList.add("hit"); hit.scrollIntoView({behavior:"smooth",block:"center"}); }
  return !!hit;
}

      ot.split(/\n+/).forEach(l=>{ const t=(l.trim().split(/[\s,]+/)[0]||"").toUpperCase(); if(t&&!a.includes(t))a.push(t); });
      if(a.length) oc=JSON.stringify(a); }

// 解析 EBK / 自選股文字 → 代號陣列。容錯:Big5/UTF-8、TSE./OTC. 前綴、.TW/.TWO 後綴、裸代號、美股代號。
function parseEbk(text){
  const out=[], seen=new Set();
  const add=c=>{ c=(c||"").toUpperCase(); if(c && !seen.has(c)){ seen.add(c); out.push(c); } };
  (text||"").split(/[\s,;、，\r\n]+/).forEach(raw=>{
    let tok=(raw||"").trim().replace(/^﻿/,"");                                            // 去 BOM
    if(tok.indexOf("#")>=0) tok=tok.split("#").pop().trim();   // 去市場別前綴,如 31#BRUN→BRUN、1#2330→2330
    if(!tok) return;
    let m;
    if(m=tok.match(/^(\d{4,6})\.(TWO?)$/i)) return add(m[1]+"."+m[2].toUpperCase());          // 2330.TW / 6488.TWO
    if(m=tok.match(/^(?:TSE|TWSE)[.:](\d{4,6})$/i)) return add(m[1]+".TW");                    // 上市
    if(m=tok.match(/^(?:OTC|TPEX|ROTC|EMG)[.:](\d{4,6})$/i)) return add(m[1]+".TWO");          // 上櫃/興櫃
    if(m=tok.match(/^[A-Z]{1,6}\.(TWO?)$/i)) return add(tok);                                  // 已含後綴
    if(m=tok.match(/^(\d{4,6})$/)) return add(m[1]);                                           // 裸數字代號→自動試上市/櫃
    if(m=tok.match(/^[A-Z][A-Z0-9.]{0,6}$/i)) return add(tok);                                 // 美股代號(含 BRK.B 類)
    if(m=tok.match(/(\d{4,6})/)) return add(m[1]);                                             // 夾在雜訊裡的數字代號
  });
  return out;
}
function importEbk(file, pid){
  if(!file) return;
  const msg=h=>{ const el=_pq(pid,"holdMsg"); if(el) el.innerHTML='<div class="legend">'+h+'</div>'; };
  const r=new FileReader();
  r.onload=()=>{
    let codes=[];
    for(const enc of ["utf-8","big5","utf-16le","utf-16be"]){   // 多種編碼都試,取解出代號最多的
      try{ const c=parseEbk(new TextDecoder(enc).decode(r.result)); if(c.length>codes.length) codes=c; }catch(_){}
    }
    if(!codes.length){ msg("⚠️ 沒從這個 EBK 讀到代號。可把檔案內容貼給我看格式,我來調解析。"); return; }
    const cur=holdCodes(pid); let added=0;
    codes.forEach(c=>{ if(!cur.includes(c)){ cur.push(c); added++; } });
    saveHoldCodes(cur, pid);
    msg("📂 已從 EBK 載入 "+codes.length+" 檔(新增 "+added+" 檔、重複略過 "+(codes.length-added)+" 檔)。");
    POOL_RENDER(pid);
  };
  r.onerror=()=>msg("⚠️ 讀檔失敗。");
  r.readAsArrayBuffer(file);
}

function evalNum(s){

  if(!/^[0-9.+\-*/() ]+$/.test(s)) return null;          // 只放行數字與 + - * / ( ) 空白

}

// N 日漲幅:對齊 adr_screen._ret_n → closes[-1]/closes[-(n+1)]-1。
function _retN(cl,n){ return (cl && cl.length>n) ? (cl[cl.length-1]/cl[cl.length-1-n]-1)*100 : null; }
// 量比:對齊 adr_screen → 最後一日成交金額 ÷ 近20日均成交金額(dv=close×vol)。
function _volr(cl,vl){
  if(!cl || !vl || cl.length<2) return null;
  const n=Math.min(20,cl.length); let sum=0;
  for(let i=cl.length-n;i<cl.length;i++) sum+=cl[i]*(vl[i]||0);
  const mean=sum/n, dv1=cl[cl.length-1]*(vl[vl.length-1]||0);
  return mean>0 ? dv1/mean : null;
}
